function toggleRouteSelection(routeId){
  if(!routeId||S.route)return;
  const next=new Set(getSelectedRouteIds());
  if(next.has(routeId)){
    next.delete(routeId);
    if(S.activeSelectedRouteId===routeId)S.activeSelectedRouteId=[...next].slice(-1)[0]||null;
  }else{
    next.add(routeId);
    S.activeSelectedRouteId=routeId;
    S.infoSlideIndex=0;
    focusRoutePreview(routeId);
  }
  S.selectedRouteIds=next;
  queueNearbyUpdate(false);
  buildRoutesList();
  renderSelectedRoutesCard();
  closePopup();
}

function findFallbackStop(){
  const names=[
    'краевая больница',
    'краевая больница 1',
    'краевая больница 2'
  ];
  for(const stop of S.allStops||[]){
    const n=normalizeName(stop.name);
    if(names.some(x=>n.includes(x))) return stop;
  }
  return (S.allStops&&S.allStops[0])||null;
}

function showVehiclesOverview(reason){
  if(S.route||!S.rtVehicles||!S.rtVehicles.length)return;
  const pts=S.rtVehicles.map(v=>[v.lon,v.lat]);
  if(S.userLocation&&S.userLocation.isFallback)pts.push([S.userLocation.lon,S.userLocation.lat]);
  if(!pts.length)return;
  const cx=pts.reduce((sum,p)=>sum+p[0],0)/pts.length;
  const cy=pts.reduce((sum,p)=>sum+p[1],0)/pts.length;
  S.didAutoFocusVehicles=true;
  deckgl.setProps({initialViewState:{longitude:cx,latitude:cy,zoom:12.8,pitch:0,bearing:0,transitionDuration:900}});
  setText('chip-txt',reason||'Показываю автобусы на карте');
}

function setUserLocationFromStop(stop, reason){
  if(!stop)return;
  S.userLocation={lon:stop.lon,lat:stop.lat,accuracy:0,isFallback:true,name:stop.name};
  deckgl.setProps({initialViewState:{longitude:stop.lon,latitude:stop.lat,zoom:15.6,pitch:0,bearing:0,transitionDuration:850}});
  queueNearbyUpdate(true);
  setText('chip-txt',reason||('Показываю район остановки '+stop.name));
  if(S.rtVehicles&&S.rtVehicles.length)showVehiclesOverview(reason||('Показываю автобусы рядом с остановкой '+stop.name));
}

function nearestTimestampOnPath(pathData,lon,lat){
  if(!pathData||!pathData.path)return 0;
  let best=0,bestD=Infinity;
  for(let i=0;i<pathData.path.length;i++){
    const p=pathData.path[i];
    const d=(p[0]-lon)*(p[0]-lon)+(p[1]-lat)*(p[1]-lat);
    if(d<bestD){bestD=d;best=pathData.timestamps[i]||0;}
  }
  return best;
}

function addPlannerEdge(adjacency, fromStopId, edge){
  if(!adjacency.has(fromStopId))adjacency.set(fromStopId,[]);
  adjacency.get(fromStopId).push(edge);
}

function walkMinutesForMeters(distanceMeters){
  if(!Number.isFinite(distanceMeters)||distanceMeters<=0)return 0;
  if(distanceMeters<=35)return 0;
  return Math.max(1,Math.round((distanceMeters/PLANNER_WALK_SPEED_MPS)/60));
}

function buildPlannerAdjacency(stopById, stopTimesByTrip, tripMetaById, routeMetaById){
  const adjacency=new Map();
  const transitBest=new Map();
  for(const [tripId,rows] of stopTimesByTrip){
    const ordered=rows.slice().sort((a,b)=>(+a.stop_sequence)-(+b.stop_sequence));
    const trip=tripMetaById.get(tripId);
    const routeId=trip&&trip.route_id;
    const route=routeId&&routeMetaById.get(routeId);
    if(!routeId||ordered.length<2)continue;
    for(let i=0;i<ordered.length-1;i++){
      const fromRow=ordered[i];
      const toRow=ordered[i+1];
      const fromStop=stopById.get(fromRow.stop_id);
      const toStop=stopById.get(toRow.stop_id);
      if(!fromStop||!toStop)continue;
      const departMin=parseTimeMin(fromRow.departure_time||fromRow.arrival_time);
      const arriveMin=parseTimeMin(toRow.arrival_time||toRow.departure_time);
      const durationMin=Math.max(1,Number.isFinite(arriveMin-departMin)?(arriveMin-departMin):2);
      const edgeKey=[fromRow.stop_id,toRow.stop_id,routeId,trip&&trip.direction_id||'',trip&&trip.trip_headsign||''].join('|');
      const candidate={
        type:'transit',
        fromStopId:fromRow.stop_id,
        toStopId:toRow.stop_id,
        fromName:fromStop.name,
        toName:toStop.name,
        routeId,
        routeShort:route&&route.route_short_name||routeId,
        headsign:trip&&trip.trip_headsign||'',
        color:route&&route.hex||resolveRouteHex(route||{route_id:routeId}),
        durationMin,
        distanceMeters:haversineMeters(fromStop.lat,fromStop.lon,toStop.lat,toStop.lon),
        path:[[fromStop.lon,fromStop.lat],[toStop.lon,toStop.lat]]
      };
      const existing=transitBest.get(edgeKey);
      if(!existing||candidate.durationMin<existing.durationMin)transitBest.set(edgeKey,candidate);
    }
  }
  for(const edge of transitBest.values())addPlannerEdge(adjacency,edge.fromStopId,edge);

  const stops=[...stopById.values()];
  for(let i=0;i<stops.length;i++){
    const a=stops[i];
    for(let j=i+1;j<stops.length;j++){
      const b=stops[j];
      const distanceMeters=haversineMeters(a.lat,a.lon,b.lat,b.lon);
      const sameName=normalizeName(a.name)===normalizeName(b.name);
      if(distanceMeters>PLANNER_TRANSFER_RADIUS_METERS && !(sameName&&distanceMeters<=PLANNER_TRANSFER_RADIUS_METERS*1.8))continue;
      const durationMin=walkMinutesForMeters(distanceMeters);
      addPlannerEdge(adjacency,a.stop_id,{
        type:'walk',
        fromStopId:a.stop_id,
        toStopId:b.stop_id,
        fromName:a.name,
        toName:b.name,
        durationMin,
        distanceMeters,
        path:[[a.lon,a.lat],[b.lon,b.lat]]
      });
      addPlannerEdge(adjacency,b.stop_id,{
        type:'walk',
        fromStopId:b.stop_id,
        toStopId:a.stop_id,
        fromName:b.name,
        toName:a.name,
        durationMin,
        distanceMeters,
        path:[[b.lon,b.lat],[a.lon,a.lat]]
      });
    }
  }
  return adjacency;
}

// ── ИНДЕКСАЦИЯ ДАННЫХ ─────────────────────────────────────
// Строит все Map-индексы из распарсенных GTFS-файлов и сохраняет их в S
function buildParsedIndexes(parsed){
  const routeMetaById=new Map();
  for(const route of (parsed.routesArr||[])){
    const hex=resolveRouteHex(route);
    routeMetaById.set(route.route_id,{...route,hex});
  }

  const allStops=(parsed.stopsArr||[]).map(row=>({
    stop_id:row.stop_id,
    name:row.stop_name||row.stop_id,
    code:row.stop_code||'',
    short_name:row.tts_stop_name||row.stop_code||'',
    desc:row.stop_desc||'',
    platform:row.platform_code||'',
    wheelchair_boarding:row.wheelchair_boarding||'',
    lon:+row.stop_lon,
    lat:+row.stop_lat,
    arrivals:[]
  })).filter(stop=>Number.isFinite(stop.lon)&&Number.isFinite(stop.lat));
  const stopById=new Map(allStops.map(stop=>[stop.stop_id,stop]));

  const shapePointsById=new Map();
  for(const row of (parsed.shapesArr||[])){
    if(!shapePointsById.has(row.shape_id))shapePointsById.set(row.shape_id,[]);
    const lon=+row.shape_pt_lon,lat=+row.shape_pt_lat;
    if(Number.isFinite(lon)&&Number.isFinite(lat)){
      shapePointsById.get(row.shape_id).push({seq:+row.shape_pt_sequence,point:[lon,lat]});
    }
  }
  for(const [shapeId,points] of shapePointsById){
    points.sort((a,b)=>a.seq-b.seq);
    shapePointsById.set(shapeId,points.map(item=>item.point));
  }

  const tripToRoute=new Map();
  const tripMetaById=new Map();
  const firstTripByRoute=new Map();
  for(const trip of (parsed.tripsArr||[])){
    tripToRoute.set(trip.trip_id,trip.route_id);
    tripMetaById.set(trip.trip_id,trip);
    if(!firstTripByRoute.has(trip.route_id))firstTripByRoute.set(trip.route_id,trip);
  }

  const vehicleMetaById=new Map((parsed.vehiclesArr||[]).map(vehicle=>[vehicle.vehicle_id,vehicle]));
  const vehicleAssignmentByTripId=new Map();
  const vehicleAssignmentByRouteId=new Map();
  for(const assignment of (parsed.vehicleTripsArr||[])){
    if(assignment.trip_id&&!vehicleAssignmentByTripId.has(assignment.trip_id))vehicleAssignmentByTripId.set(assignment.trip_id,assignment);
    if(assignment.route_id&&!vehicleAssignmentByRouteId.has(assignment.route_id))vehicleAssignmentByRouteId.set(assignment.route_id,assignment);
  }

  const frequencyRowsByTrip=new Map();
  for(const row of (parsed.frequenciesArr||[])){
    const startMin=parseTimeMin(row.start_time);
    const endMin=parseTimeMin(row.end_time);
    const headwaySec=Math.max(60,+row.headway_secs||0);
    if(!row.trip_id||!Number.isFinite(startMin)||!Number.isFinite(endMin)||endMin<=startMin||!headwaySec)continue;
    if(!frequencyRowsByTrip.has(row.trip_id))frequencyRowsByTrip.set(row.trip_id,[]);
    frequencyRowsByTrip.get(row.trip_id).push({startMin,endMin,headwaySec});
  }

  const arrivalsByStopId=new Map();
  const routeIdsByStopId=new Map();
  const routeStopArrivalsById=new Map();
  const firstTripStopsByRoute=new Map();
  const stopTimesByTrip=new Map();

  for(const row of (parsed.stopTimesArr||[])){
    const routeId=tripToRoute.get(row.trip_id);
    if(!routeId)continue;
    const dep=row.departure_time||row.arrival_time;
    if(!dep)continue;
    const stopId=row.stop_id;
    const routeMeta=routeMetaById.get(routeId);
    const arrival={
      tripId:row.trip_id,
      time:dep,
      mins:parseTimeMin(dep),
      routeId,
      routeShort:(routeMeta&&routeMeta.route_short_name)||routeId
    };
    if(!arrivalsByStopId.has(stopId))arrivalsByStopId.set(stopId,[]);
    arrivalsByStopId.get(stopId).push(arrival);

    let routeIds=routeIdsByStopId.get(stopId);
    if(!routeIds){
      routeIds=new Set();
      routeIdsByStopId.set(stopId,routeIds);
    }
    routeIds.add(routeId);

    let routeStopArrivals=routeStopArrivalsById.get(routeId);
    if(!routeStopArrivals){
      routeStopArrivals=new Map();
      routeStopArrivalsById.set(routeId,routeStopArrivals);
    }
    if(!routeStopArrivals.has(stopId))routeStopArrivals.set(stopId,[]);
    routeStopArrivals.get(stopId).push({tripId:row.trip_id,time:dep});

    if(!stopTimesByTrip.has(row.trip_id))stopTimesByTrip.set(row.trip_id,[]);
    stopTimesByTrip.get(row.trip_id).push(row);

    const firstTrip=firstTripByRoute.get(routeId);
    if(firstTrip&&row.trip_id===firstTrip.trip_id){
      if(!firstTripStopsByRoute.has(routeId))firstTripStopsByRoute.set(routeId,[]);
      firstTripStopsByRoute.get(routeId).push(row);
    }
  }

  for(const rows of stopTimesByTrip.values())rows.sort((a,b)=>(+a.stop_sequence)-(+b.stop_sequence));

  for(const arrivals of arrivalsByStopId.values())arrivals.sort((a,b)=>a.mins-b.mins);
  for(const routeStopArrivals of routeStopArrivalsById.values()){
    for(const arrivals of routeStopArrivals.values())arrivals.sort((a,b)=>a.time.localeCompare(b.time));
  }

  const routeContextById=new Map();
  const routeAnimById=new Map();
  for(const [routeId,routeMeta] of routeMetaById){
    const firstTrip=firstTripByRoute.get(routeId)||null;
    const shapePath=(firstTrip&&shapePointsById.get(firstTrip.shape_id))||[];
    const simTrips=[];
    for(const trip of (parsed.tripsArr||[]).filter(item=>item.route_id===routeId)){
      const stopTimes=(stopTimesByTrip.get(trip.trip_id)||[]).slice().sort((a,b)=>(+a.stop_sequence)-(+b.stop_sequence));
      if(stopTimes.length<2)continue;
      const firstStop=stopTimes[0];
      const lastStop=stopTimes[stopTimes.length-1];
      const templateStartMin=parseTimeMin(firstStop.departure_time||firstStop.arrival_time);
      const templateEndMin=parseTimeMin(lastStop.arrival_time||lastStop.departure_time);
      if(!Number.isFinite(templateStartMin)||!Number.isFinite(templateEndMin)||templateEndMin<=templateStartMin)continue;
      const durationMin=templateEndMin-templateStartMin;
      const freqRows=frequencyRowsByTrip.get(trip.trip_id)||[];
      if(freqRows.length){
        for(const freq of freqRows){
          let seq=0;
          for(let dep=freq.startMin; dep<freq.endMin; dep+=freq.headwaySec/60){
            simTrips.push({
              tripId:trip.trip_id+':'+seq,
              tripTemplateId:trip.trip_id,
              headsign:trip.trip_headsign||'',
              directionId:trip.direction_id||'',
              startMin:dep,
              endMin:dep+durationMin,
              durationMin,
              headwaySec:freq.headwaySec
            });
            seq++;
          }
        }
      }else{
        simTrips.push({
          tripId:trip.trip_id,
          tripTemplateId:trip.trip_id,
          headsign:trip.trip_headsign||'',
          directionId:trip.direction_id||'',
          startMin:templateStartMin,
          endMin:templateEndMin,
          durationMin,
          headwaySec:0
        });
      }
    }
    simTrips.sort((a,b)=>a.startMin-b.startMin);
    const orderedStops=(firstTripStopsByRoute.get(routeId)||[]).slice().sort((a,b)=>(+a.stop_sequence)-(+b.stop_sequence)).map(st=>{
      const stopInfo=stopById.get(st.stop_id);
      return{
        stop_id:st.stop_id,
        name:stopInfo&&stopInfo.name||st.stop_id,
        code:stopInfo&&stopInfo.code||'',
        lon:+(stopInfo&&stopInfo.lon||0),
        lat:+(stopInfo&&stopInfo.lat||0),
        arrivals:(routeStopArrivalsById.get(routeId)&&routeStopArrivalsById.get(routeId).get(st.stop_id))||[]
      };
    }).filter(stop=>stop.lon&&stop.lat);
    routeContextById.set(routeId,{route:routeMeta,firstTrip,shapePath,stops:orderedStops,simTrips});
    if(shapePath.length>1)routeAnimById.set(routeId,buildTripsData(shapePath)[0]);
  }

  const calendarByServiceId=new Map();
  for(const row of (parsed.calendarArr||[])){
    if(row.service_id)calendarByServiceId.set(row.service_id,row);
  }
  const tripToService=new Map();
  for(const trip of (parsed.tripsArr||[])){
    if(trip.trip_id&&trip.service_id)tripToService.set(trip.trip_id,trip.service_id);
  }

  S.allStops=allStops;
  S.tripToRoute=tripToRoute;
  S.tripMetaById=tripMetaById;
  S.routeMetaById=routeMetaById;
  S.stopById=stopById;
  S.shapePointsById=shapePointsById;
  S.arrivalsByStopId=arrivalsByStopId;
  S.routeIdsByStopId=routeIdsByStopId;
  S.routeContextById=routeContextById;
  S.routeAnimById=routeAnimById;
  S.calendarByServiceId=calendarByServiceId;
  S.tripToService=tripToService;
  S.stopTimesByTrip=stopTimesByTrip;
  S.plannerAdjacency=buildPlannerAdjacency(stopById,stopTimesByTrip,tripMetaById,routeMetaById);
  S.vehicleMetaById=vehicleMetaById;
  S.vehicleAssignmentByTripId=vehicleAssignmentByTripId;
  S.vehicleAssignmentByRouteId=vehicleAssignmentByRouteId;
}

function formatPlannerDuration(value){
  const rounded=Math.max(0,Math.round(value||0));
  if(currentLang==='en')return rounded+' min';
  if(currentLang==='zh' || currentLang==='ja')return rounded+' 分';
  return rounded+' мин';
}

function formatPlannerDistance(distanceMeters){
  const rounded=Math.max(0,Math.round(distanceMeters||0));
  if(rounded>=1000)return (rounded/1000).toFixed(1)+' км';
  return rounded+' м';
}

function plannerStateKey(nodeId,currentRouteId,lastTransitRouteId,lastEdgeType){
  return [nodeId,currentRouteId||'',lastTransitRouteId||'',lastEdgeType||''].join('|');
}

function plannerStateScore(state){
  return (state.totalMin||0)+(state.transfers||0)*10;
}

function isPlannerCostBetter(candidate,existing){
  if(!existing)return true;
  const candidateScore=plannerStateScore(candidate);
  const existingScore=plannerStateScore(existing);
  if(candidateScore!==existingScore)return candidateScore<existingScore;
  if((candidate.transfers||0)!==(existing.transfers||0))return (candidate.transfers||0)<(existing.transfers||0);
  if((candidate.totalMin||0)!==(existing.totalMin||0))return (candidate.totalMin||0)<(existing.totalMin||0);
  return (candidate.walkMin||0)<(existing.walkMin||0);
}

function takeBestPlannerState(queue){
  let bestIndex=0;
  for(let i=1;i<queue.length;i++){
    if(isPlannerCostBetter(queue[i],queue[bestIndex]))bestIndex=i;
  }
  return queue.splice(bestIndex,1)[0];
}

function getPlannerAccessStops(point,maxRadiusMeters=PLANNER_WALK_RADIUS_METERS){
  if(!point||!S.allStops.length)return [];
  const candidates=S.allStops.map(stop=>{
    const distanceMeters=haversineMeters(point.lat,point.lon,stop.lat,stop.lon);
    return {stopId:stop.stop_id,stop,distanceMeters,durationMin:walkMinutesForMeters(distanceMeters)};
  }).sort((a,b)=>a.distanceMeters-b.distanceMeters);
  const nearby=candidates.filter(item=>item.distanceMeters<=maxRadiusMeters).slice(0,8);
  if(nearby.length)return nearby;
  return candidates.slice(0,6).filter(item=>item.distanceMeters<=maxRadiusMeters*2.2);
}

function plannerPointTitle(point){
  if(!point)return '—';
  return point.stopName||t('planner.pointOnMap');
}

function plannerPointMeta(point){
  if(!point)return '';
  if(point.source==='user')return t('planner.fromMyLocation');
  if(point.nearStopName){
    const dist=point.nearDistanceMeters?(' · '+formatPlannerDistance(point.nearDistanceMeters)):'';
    return t('planner.nearStop')+' '+point.nearStopName+dist;
  }
  return point.lat.toFixed(5)+', '+point.lon.toFixed(5);
}

function makePlannerPoint(lon,lat,meta={}){
  const point={
    lon,lat,
    source:meta.source||'map',
    stopId:meta.stopId||'',
    stopName:meta.stopName||'',
    label:meta.label||t('planner.pointOnMap'),
    nearStopId:meta.stopId||'',
    nearStopName:meta.stopName||'',
    nearDistanceMeters:0
  };
  if(!point.stopId){
    const nearest=getPlannerAccessStops({lon,lat},Math.min(PLANNER_TRANSFER_RADIUS_METERS,260))[0];
    if(nearest){
      point.nearStopId=nearest.stopId;
      point.nearStopName=nearest.stop.name;
      point.nearDistanceMeters=nearest.distanceMeters;
    }
  }
  return point;
}

function appendPlannerPath(target, points){
  if(!points||!points.length)return;
  if(!target.path.length){
    target.path=points.slice();
    return;
  }
  const last=target.path[target.path.length-1];
  const next=points[0];
  const same=last&&next&&last[0]===next[0]&&last[1]===next[1];
  target.path.push(...(same?points.slice(1):points));
}

function buildPlannerResult(finalState, states){
  const edges=[];
  let cursor=finalState;
  while(cursor&&cursor.viaEdge){
    edges.push(cursor.viaEdge);
    cursor=cursor.prevKey?states.get(cursor.prevKey):null;
  }
  edges.reverse();
  const legs=[];
  for(const edge of edges){
    if(!edge)continue;
    const last=legs[legs.length-1];
    if(edge.type==='walk'){
      if(last&&last.type==='walk'){
        last.durationMin+=edge.durationMin||0;
        last.distanceMeters+=edge.distanceMeters||0;
        last.toName=edge.toName||last.toName;
        last.toStopId=edge.toStopId||last.toStopId;
        appendPlannerPath(last,edge.path||[]);
      }else{
        legs.push({
          type:'walk',
          durationMin:edge.durationMin||0,
          distanceMeters:edge.distanceMeters||0,
          fromName:edge.fromName||'',
          toName:edge.toName||'',
          fromStopId:edge.fromStopId||'',
          toStopId:edge.toStopId||'',
          path:(edge.path||[]).slice()
        });
      }
      continue;
    }
    if(last&&last.type==='transit'&&last.routeId===edge.routeId){
      last.durationMin+=edge.durationMin||0;
      last.waitMin+=edge.waitMin||0;
      last.distanceMeters+=edge.distanceMeters||0;
      last.toName=edge.toName||last.toName;
      last.toStopId=edge.toStopId||last.toStopId;
      last.stopCount+=1;
      appendPlannerPath(last,edge.path||[]);
    }else{
      legs.push({
        type:'transit',
        routeId:edge.routeId,
        routeShort:edge.routeShort||edge.routeId,
        color:edge.color||'#e84525',
        headsign:edge.headsign||'',
        durationMin:edge.durationMin||0,
        waitMin:edge.waitMin||0,
        distanceMeters:edge.distanceMeters||0,
        fromName:edge.fromName||'',
        toName:edge.toName||'',
        fromStopId:edge.fromStopId||'',
        toStopId:edge.toStopId||'',
        stopCount:1,
        path:(edge.path||[]).slice()
      });
    }
  }
  return {
    totalTimeMin:finalState.totalMin||0,
    totalWalkMin:legs.filter(leg=>leg.type==='walk').reduce((sum,leg)=>sum+(leg.durationMin||0),0),
    transfers:finalState.transfers||0,
    legs
  };
}

function computePlannerRoute(){
  S.planner.result=null;
  S.planner.error='';
  S.planner.stats=null;
  const from=S.planner.from;
  const to=S.planner.to;
  if(!from||!to){
    S.planner.error=t('planner.ready');
    renderPlannerCard();
    return null;
  }
  if(!S.plannerAdjacency.size){
    S.planner.error=t('planner.noRoute');
    renderPlannerCard();
    return null;
  }

  const startCandidates=getPlannerAccessStops(from);
  const endCandidates=getPlannerAccessStops(to);
  if(!startCandidates.length||!endCandidates.length){
    S.planner.error=t('planner.noRoute');
    renderPlannerCard();
    return null;
  }

  const endByStopId=new Map();
  for(const candidate of endCandidates){
    const prev=endByStopId.get(candidate.stopId);
    if(!prev||candidate.durationMin<prev.durationMin)endByStopId.set(candidate.stopId,candidate);
  }

  const queue=[];
  const bestByKey=new Map();
  const states=new Map();

  for(const candidate of startCandidates){
    const key=plannerStateKey(candidate.stopId,null,null,'walk');
    const state={
      key,
      nodeId:candidate.stopId,
      totalMin:candidate.durationMin,
      walkMin:candidate.durationMin,
      transfers:0,
      currentRouteId:null,
      lastTransitRouteId:null,
      lastEdgeType:'walk',
      usedTransit:false,
      prevKey:null,
      viaEdge:{
        type:'walk',
        fromName:plannerPointTitle(from),
        toName:candidate.stop.name,
        fromStopId:'__from__',
        toStopId:candidate.stopId,
        durationMin:candidate.durationMin,
        distanceMeters:candidate.distanceMeters,
        path:[[from.lon,from.lat],[candidate.stop.lon,candidate.stop.lat]]
      }
    };
    const prev=bestByKey.get(key);
    if(isPlannerCostBetter(state,prev)){
      bestByKey.set(key,state);
      states.set(key,state);
      queue.push(state);
    }
  }

  let bestFinal=null;
  while(queue.length){
    const state=takeBestPlannerState(queue);
    if(bestByKey.get(state.key)!==state)continue;

    const finish=endByStopId.get(state.nodeId);
    if(finish&&state.usedTransit){
      const finalKey=state.key+'|finish';
      const finishState={
        key:finalKey,
        nodeId:'__to__',
        totalMin:state.totalMin+finish.durationMin,
        walkMin:state.walkMin+finish.durationMin,
        transfers:state.transfers,
        currentRouteId:null,
        lastTransitRouteId:state.lastTransitRouteId,
        lastEdgeType:'walk',
        usedTransit:true,
        prevKey:state.key,
        viaEdge:{
          type:'walk',
          fromName:finish.stop.name,
          toName:plannerPointTitle(to),
          fromStopId:finish.stopId,
          toStopId:'__to__',
          durationMin:finish.durationMin,
          distanceMeters:finish.distanceMeters,
          path:[[finish.stop.lon,finish.stop.lat],[to.lon,to.lat]]
        }
      };
      if(isPlannerCostBetter(finishState,bestFinal)){
        bestFinal=finishState;
        states.set(finalKey,finishState);
      }
    }

    const edges=S.plannerAdjacency.get(state.nodeId)||[];
    for(const edge of edges){
      let nextState;
      if(edge.type==='walk'){
        nextState={
          key:plannerStateKey(edge.toStopId,null,state.lastTransitRouteId,'walk'),
          nodeId:edge.toStopId,
          totalMin:state.totalMin+(edge.durationMin||0),
          walkMin:state.walkMin+(edge.durationMin||0),
          transfers:state.transfers,
          currentRouteId:null,
          lastTransitRouteId:state.lastTransitRouteId,
          lastEdgeType:'walk',
          usedTransit:state.usedTransit,
          prevKey:state.key,
          viaEdge:{...edge}
        };
      }else{
        const sameTransit=state.lastEdgeType==='transit'&&state.currentRouteId===edge.routeId;
        const transferInc=!sameTransit&&state.lastTransitRouteId&&state.lastTransitRouteId!==edge.routeId?1:0;
        const waitMin=sameTransit?0:(state.lastTransitRouteId?PLANNER_TRANSFER_WAIT_MIN:PLANNER_INITIAL_WAIT_MIN);
        nextState={
          key:plannerStateKey(edge.toStopId,edge.routeId,edge.routeId,'transit'),
          nodeId:edge.toStopId,
          totalMin:state.totalMin+(edge.durationMin||0)+waitMin,
          walkMin:state.walkMin,
          transfers:state.transfers+transferInc,
          currentRouteId:edge.routeId,
          lastTransitRouteId:edge.routeId,
          lastEdgeType:'transit',
          usedTransit:true,
          prevKey:state.key,
          viaEdge:{...edge,durationMin:(edge.durationMin||0)+waitMin,waitMin}
        };
      }
      const existing=bestByKey.get(nextState.key);
      if(isPlannerCostBetter(nextState,existing)){
        bestByKey.set(nextState.key,nextState);
        states.set(nextState.key,nextState);
        queue.push(nextState);
      }
    }
  }

  if(!bestFinal){
    S.planner.error=t('planner.noRoute');
    renderPlannerCard();
    return null;
  }

  S.planner.result=buildPlannerResult(bestFinal,states);
  S.planner.error='';
  S.planner.stats={startCandidates:startCandidates.length,endCandidates:endCandidates.length};
  S.planner.pickMode=null;
  const plannerCoords=S.planner.result.legs.flatMap(leg=>leg.path||[]);
  if(plannerCoords.length){
    const lons=plannerCoords.map(point=>point[0]);
    const lats=plannerCoords.map(point=>point[1]);
    const span=Math.max((Math.max(...lons)-Math.min(...lons))*1.25,(Math.max(...lats)-Math.min(...lats))*1.25,0.01);
    const zoom=span>0.25?11.4:span>0.12?12.2:span>0.05?13.2:14.2;
    deckgl.setProps({initialViewState:{
      longitude:(Math.min(...lons)+Math.max(...lons))/2,
      latitude:(Math.min(...lats)+Math.max(...lats))/2,
      zoom,pitch:0,bearing:0,transitionDuration:850
    }});
  }
  updatePlannerButton();
  renderPlannerCard();
  return S.planner.result;
}

// Обновляет позиции и углы всех транспортных средств за прошедший кадр (deltaMs)
function advanceVehicles(deltaMs){
  if(!S.rtVehicles||!S.rtVehicles.length)return;
  const motionEase=dampFactor(deltaMs,VEHICLE_MOTION_SMOOTHING_MS);
  const bearingEase=dampFactor(deltaMs,VEHICLE_BEARING_SMOOTHING_MS);
  for(const v of S.rtVehicles){
    if(v.pathData){
      const delta=deltaMs*clampAnimVelocity(Number.isFinite(v.animVelocity)?v.animVelocity:getFallbackAnimVelocity(v.routeId));
      v.targetAnimTime=((Number.isFinite(v.targetAnimTime)?v.targetAnimTime:(v.animTime||0))+delta)%LOOP;
      const animDelta=shortestLoopDelta(v.animTime||0,v.targetAnimTime||0,LOOP);
      v.animTime=((v.animTime||0)+animDelta*motionEase+LOOP)%LOOP;
      const pos=getPathPos(v.pathData,v.animTime);
      if(!pos)continue;
      v.lon=pos[0];
      v.lat=pos[1];
      const p1=v.pathData.path[pos[2]];
      const p2=v.pathData.path[pos[3]];
      const targetBearing=getBearing(p1,p2);
      v.bearing=lerpAngle(Number.isFinite(v.bearing)?v.bearing:targetBearing,targetBearing,bearingEase);
      continue;
    }
    if(Number.isFinite(v.targetLon)&&Number.isFinite(v.targetLat)){
      v.lon=lerp(Number.isFinite(v.lon)?v.lon:v.targetLon,v.targetLon,motionEase);
      v.lat=lerp(Number.isFinite(v.lat)?v.lat:v.targetLat,v.targetLat,motionEase);
    }
    if(Number.isFinite(v.targetBearing)){
      v.bearing=lerpAngle(Number.isFinite(v.bearing)?v.bearing:v.targetBearing,v.targetBearing,bearingEase);
    }
  }
}

// Границы Камчатского края (с запасом)
const KAMCHATKA_BOUNDS={latMin:50.8,latMax:60.5,lonMin:155.0,lonMax:167.0};
const PKC={lon:158.700,lat:53.015};

function isOnKamchatka(lat,lon){
  return lat>=KAMCHATKA_BOUNDS.latMin&&lat<=KAMCHATKA_BOUNDS.latMax&&
         lon>=KAMCHATKA_BOUNDS.lonMin&&lon<=KAMCHATKA_BOUNDS.lonMax;
}

function geolocateMe(){
  const goToPKC=()=>{
    deckgl.setProps({initialViewState:{longitude:PKC.lon,latitude:PKC.lat,zoom:12.5,pitch:0,bearing:0,transitionDuration:850}});
    S.userLocation={lon:PKC.lon,lat:PKC.lat,accuracy:0,isFallback:true};
    queueNearbyUpdate(true);
    setText('chip-txt','Петропавловск-Камчатский');
  };
  if(!navigator.geolocation){goToPKC();return;}
  setText('chip-txt','Определяю местоположение…');
  navigator.geolocation.getCurrentPosition(pos=>{
    const lon=pos.coords.longitude,lat=pos.coords.latitude;
    if(!isOnKamchatka(lat,lon)){
      // Пользователь вне Камчатки — показываем ПКЧ
      goToPKC();
      return;
    }
    S.userLocation={lon,lat,accuracy:pos.coords.accuracy||0};
    deckgl.setProps({initialViewState:{longitude:lon,latitude:lat,zoom:15.8,pitch:0,bearing:0,transitionDuration:850}});
    queueNearbyUpdate(true);
    setText('chip-txt','Вы здесь');
    if(S.userLocationWatchId==null){
      S.userLocationWatchId=navigator.geolocation.watchPosition(w=>{
        const wlon=w.coords.longitude,wlat=w.coords.latitude;
        if(isOnKamchatka(wlat,wlon)){
          S.userLocation={lon:wlon,lat:wlat,accuracy:w.coords.accuracy||0};
          queueNearbyUpdate(false);
        }
      },()=>{
        if(S.userLocation&&S.userLocation.isFallback) return;
      },{enableHighAccuracy:true,maximumAge:10000,timeout:15000});
    }
  },err=>{
    console.error(err);
    goToPKC();
  },{enableHighAccuracy:true,maximumAge:10000,timeout:15000});
}

function haversineMeters(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function getCurrentBBox(){
  const vp=deckgl&&deckgl.getViewports&&deckgl.getViewports()[0];
  if(!vp)return null;
  const a=vp.unproject([0,0]);
  const b=vp.unproject([window.innerWidth,window.innerHeight]);
  if(!a||!b)return null;
  return {minLon:Math.min(a[0],b[0]),maxLon:Math.max(a[0],b[0]),minLat:Math.min(a[1],b[1]),maxLat:Math.max(a[1],b[1])};
}

function stopInBBox(stop,b){
  return stop.lon>=b.minLon && stop.lon<=b.maxLon && stop.lat>=b.minLat && stop.lat<=b.maxLat;
}

function updateNearbyContext(centerMap){
  if(!S.allStops.length)return;
  const bbox=getCurrentBBox();
  if(!bbox)return;
  const centerLat=(bbox.minLat+bbox.maxLat)/2;
  const centerLon=(bbox.minLon+bbox.maxLon)/2;
  const dedup=new Map();
  for(const stop of S.allStops){
    if(!stopInBBox(stop,bbox)) continue;
    const distance=haversineMeters(centerLat,centerLon,stop.lat,stop.lon);
    const key=normalizeName(stop.name||stop.stop_id);
    const candidate={...stop,distance,arrivals:nearestArrivalForStop(stop)};
    const prev=dedup.get(key);
    if(!prev || distance<prev.distance) dedup.set(key,candidate);
  }
  const visible=[...dedup.values()].sort((a,b)=>a.distance-b.distance).slice(0,24);
  const selectedRouteIds=!S.route?getSelectedRouteIds():[];
  const filteredVisible=selectedRouteIds.length?visible.filter(stop=>{
    const stopRouteIds=S.routeIdsByStopId.get(stop.stop_id);
    if(!stopRouteIds||!stopRouteIds.size)return false;
    return selectedRouteIds.some(routeId=>stopRouteIds.has(routeId));
  }):visible;
  S.nearbyStops=filteredVisible;

  const routeIds=new Set();
  for(const stop of filteredVisible){
    const stopRouteIds=S.routeIdsByStopId.get(stop.stop_id);
    if(!stopRouteIds)continue;
    for(const routeId of stopRouteIds)routeIds.add(routeId);
  }
  S.visibleRoutes=[...(selectedRouteIds.length?selectedRouteIds.filter(routeId=>routeIds.has(routeId)):routeIds)].map(id=>S.routeMetaById.get(id)).filter(Boolean).sort((a,b)=>String(a.route_short_name||a.route_id).localeCompare(String(b.route_short_name||b.route_id),undefined,{numeric:true}));
  if(!S.route){
    S.stops=filteredVisible;
    buildStopList();
    buildRoutesList();
    buildHtmlLabels();
    if(!filteredVisible.length) renderEmptyState('stops');
    if(!S.visibleRoutes.length) renderEmptyState('routes');
    renderSelectedRoutesCard();
  }
}

function csv(t){
  if(!t||!t.trim())return[];
  // Strip BOM if present
  const clean=t.charCodeAt(0)===0xFEFF?t.slice(1):t;
  return Papa.parse(clean.trim(),{header:true,skipEmptyLines:true,quoteChar:'"',delimiter:','}).data;
}

function parseGTFSFiles(files){
  return{

    tripsArr:     csv(files['trips.txt']     ||''),
    stopsArr:     csv(files['stops.txt']     ||''),
    shapesArr:    csv(files['shapes.txt']    ||''),

}

// Load from ./gtfs/ folder
async function loadFilesFromFolder(onProg){
  const required=['routes.txt','trips.txt','stops.txt','shapes.txt','stop_times.txt'];
  const optional=['frequencies.txt','vehicles.txt','vehicle_trips.txt','calendar.txt'];
  const FILES=[...required,...optional];
  const files={};
  for(let i=0;i<FILES.length;i++){
    onProg&&onProg(Math.round(10+(i/FILES.length)*75),'Загрузка '+FILES[i]+'…');
    const r=await fetch('./gtfs/'+FILES[i]);
    if(!r.ok){
      if(required.includes(FILES[i]))throw new Error('Не удалось загрузить gtfs/'+FILES[i]+' (HTTP '+r.status+')');
      continue;
    }
    files[FILES[i]]=await r.text();
  }
  onProg&&onProg(100,'Готово!');
  return files;
}

// Parse from ArrayBuffer (zip)
async function loadFilesFromZip(source,onProg){
  onProg&&onProg(15,'Распаковка ZIP-архива…');
  const zip=await JSZip.loadAsync(source);
  onProg&&onProg(45,'Чтение файлов…');
  const needed=['routes.txt','trips.txt','stops.txt','shapes.txt','stop_times.txt','frequencies.txt','vehicles.txt','vehicle_trips.txt','calendar.txt'];
  const files={};
  for(const name of needed){
    const entry=zip.file(name);
    if(entry){files[name]=await entry.async('string');}
  }
  if(!files['routes.txt'])throw new Error('Файл routes.txt не найден в архиве. Убедитесь, что это GTFS-архив.');
  onProg&&onProg(100,'Готово!');
  return files;
}

// Fetch zip from URL and parse
async function loadFilesFromUrl(url,onProg){
  onProg&&onProg(5,'Соединение с сервером…');
  let r;
  try{r=await fetch(url);}catch(e){throw new Error('Сетевая ошибка: '+e.message+'. Проверьте URL и CORS на сервере.');}
  if(!r.ok)throw new Error('Сервер вернул ошибку HTTP '+r.status);
  onProg&&onProg(35,'Загрузка данных…');
  const buf=await r.arrayBuffer();
  onProg&&onProg(60,'Обработка ZIP…');
  const files=await loadFilesFromZip(buf,(p,t)=>onProg&&onProg(60+p*.38,t));
  return files;
}

function matchesQuery(text, words){
  const t=text.toLowerCase();
  return words.every(w=>t.includes(w));
}
function filterRoutes(q){
  const lq=q.toLowerCase().trim();
  if(!lq){renderRouteList(allRoutesCache);return;}
  const words=lq.split(/\s+/).filter(Boolean);
  const haystack=r=>(r.route_short_name||'')+' '+(r.route_long_name||'')+' '+(r.route_id||'');
  const filtered=allRoutesCache.filter(r=>matchesQuery(haystack(r),words));
  renderRouteList(filtered);
}
function filterStops(q){
  const lq=q.toLowerCase().trim();
  const words=lq.split(/\s+/).filter(Boolean);
  ['d-slist','m-slist'].forEach(id=>{
    const ul=document.getElementById(id);if(!ul)return;
    ul.innerHTML='';
    const source=S.allStops&&S.allStops.length?S.allStops:S.stops;
    const list=lq?source.filter(s=>matchesQuery(s.name||'',words)):source;
    if(!list.length){ul.innerHTML='<div class="route-list-empty">Ничего не найдено</div>';return;}
    list.slice(0,60).forEach(s=>{
      const li=document.createElement('div');li.className='si';
      li.innerHTML='<div class="sd">⬤</div><div class="si-info" style="cursor:pointer" onclick="openPopupForStop(\''+s.stop_id+'\')"><div class="si-name">'+escHtml(s.name)+'</div><div class="si-sub">'+(s.short_name||s.stop_id||'')+'</div></div>';
      ul.appendChild(li);
    });
  });
}

async function setupAndShowRoute(routeId){
  showLoading('Загрузка маршрута…',10);
  const{routesArr}=S.parsed;
  const ctx=S.routeContextById.get(routeId)||null;

  // Route info
  const route=(ctx&&ctx.route)||S.routeMetaById.get(routeId)||routesArr.find(r=>r.route_id===routeId)||routesArr[0];
  const hex=(route&&route.hex)||(route&&route.route_color?'#'+route.route_color.replace(/^#/,''):'#e84525');
  S.route={id:route.route_id,shortName:route.route_short_name||route.route_id,longName:route.route_long_name||'',color:hexRgb(hex),hex};
  S.selectedRouteIds=new Set([routeId]);
  S.activeSelectedRouteId=routeId;
  S.infoSlideIndex=0;

  ldProg(30,'Построение маршрута…');

  // Build shape path
  S.shapePath=(ctx&&ctx.shapePath&&ctx.shapePath.length)?ctx.shapePath.slice():[];
  if(S.shapePath.length<2)S.shapePath=[[37.6558,55.7128],[37.6560,55.7052]];
  S.tripsData=buildTripsData(S.shapePath);
  S.currentTime=0;

  ldProg(55,'Загрузка остановок…');

  // Build stops
  S.stops=(ctx&&ctx.stops&&ctx.stops.length?ctx.stops:[]).map(stop=>({...stop}));

  ldProg(80,'Обновление интерфейса…');

  // Update UI panels
  const meta='Параметры маршрута';
  ['d-badge','m-badge'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.style.background=S.route.hex;
    const sp=el.querySelector('span');
    if(sp)sp.textContent=S.route.shortName;
  });
  setText('d-rnum',S.route.shortName);setText('m-rnum',S.route.shortName);
  setText('d-rname',S.route.longName||S.route.shortName);setText('m-rname',S.route.longName||S.route.shortName);
  setText('d-rmeta',meta);setText('m-rmeta',meta);
  document.title=S.route.shortName+' · '+(S.route.longName||'Камчатка.Транспорт');

  renderRouteParams(route);
  buildStopList();
  buildHtmlLabels();
  initBusPin();

  // Center map on route
  if(S.shapePath.length>0){
    const cx=S.shapePath.reduce((s,p)=>s+p[0],0)/S.shapePath.length;
    const cy=S.shapePath.reduce((s,p)=>s+p[1],0)/S.shapePath.length;
    deckgl.setProps({initialViewState:{longitude:cx,latitude:cy,zoom:13.5,pitch:0,bearing:0,transitionDuration:900}});
  }

  ldProg(100,'Готово!');
  setTimeout(hideLoading,350);

  startRealtime();
}

// ── GTFS-RT ──────────────────────────────────────────────────
function getRtHttpUrl(){
  try{
    const qp=new URLSearchParams(location.search);
    return qp.get('rthttp')||localStorage.getItem('rt-http-url')||'./gtfs-rt/vehicle_positions.json';
  }catch(_){
    return './gtfs-rt/vehicle_positions.json';
  }
}

function getRtWsUrl(){
  try{
    const qp=new URLSearchParams(location.search);
    const explicit=qp.get('rtws')||localStorage.getItem('rt-ws-url');
    if(explicit)return explicit;
    const proto=location.protocol==='https:'?'wss:':'ws:';
    if(!location.host)return '';
    return proto+'//'+location.host+'/transit/ws?city=pk&version=1';
  }catch(_){
    return '';
  }
}

function updateRealtimeBar(label){
  const bar=document.getElementById('rtbar');
  const msg=document.getElementById('rtmsg');
  if(!bar||!msg)return;
  bar.classList.add('show');
  const count=S.rtVehicles&&S.rtVehicles.length||0;
  const time=new Date().toLocaleTimeString('ru');
  msg.textContent=label+' · '+count+' ТС · '+time;
}

function buildRtVehicle(rec, prev, nowTs){
  const routeId=rec.routeId||rec.route_id||'';
  const pathData=S.routeAnimById.get(routeId)||null;
  const baseLon=+rec.lon;
  const baseLat=+rec.lat;
  const targetBearing=Number.isFinite(+rec.bearing)?+rec.bearing:(prev&&prev.targetBearing);
  const snappedAnimTime=Number.isFinite(+rec.animTime)
    ? +rec.animTime
    : (pathData?nearestTimestampOnPath(pathData,baseLon,baseLat):(prev&&Number.isFinite(prev.targetAnimTime)?prev.targetAnimTime:0));
  let desiredAnimTime=snappedAnimTime;
  let animVelocity=clampAnimVelocity(Number.isFinite(+rec.animVelocity)?+rec.animVelocity:(prev&&prev.animVelocity)||getFallbackAnimVelocity(routeId));
  if(pathData&&prev&&prev.pathData===pathData&&Number.isFinite(prev.targetAnimTime)){
    const correction=shortestLoopDelta(prev.targetAnimTime,snappedAnimTime,LOOP);
    desiredAnimTime=(prev.targetAnimTime+correction*0.22+LOOP)%LOOP;
    const elapsed=Math.max(250,(nowTs||performance.now())-(prev.lastFeedTs||(nowTs||performance.now())-1000));
    const observedVelocity=Math.abs(correction)/elapsed;
    if(Number.isFinite(observedVelocity)&&observedVelocity>0){
      animVelocity=clampAnimVelocity(animVelocity*0.82+observedVelocity*0.18);
    }
  }
  const routeMeta=S.routeMetaById.get(routeId);
  const v={
    id:rec.id,
    label:rec.label||((routeMeta&&routeMeta.route_short_name)||routeId||'?'),
    lat:prev&&Number.isFinite(prev.lat)?prev.lat:baseLat,
    lon:prev&&Number.isFinite(prev.lon)?prev.lon:baseLon,
    routeId,
    tripId:rec.tripId||'',
    pathData,
    animTime:(prev&&prev.pathData===pathData&&Number.isFinite(prev.animTime))?prev.animTime:desiredAnimTime,
    targetAnimTime:desiredAnimTime,
    animVelocity,
    bearing:Number.isFinite(prev&&prev.bearing)?prev.bearing:(Number.isFinite(targetBearing)?targetBearing:0),
    targetBearing:Number.isFinite(targetBearing)?targetBearing:null,
    targetLon:baseLon,
    targetLat:baseLat,
    lastFeedTs:nowTs||performance.now(),
    source:rec.source||''
  };
  if(pathData){
    const pos=getPathPos(pathData,v.animTime);
    if(pos){
      if(!(prev&&Number.isFinite(prev.lon)&&Number.isFinite(prev.lat))){
        v.lon=pos[0];
        v.lat=pos[1];
      }
      const derivedBearing=getBearing(pathData.path[pos[2]],pathData.path[pos[3]]);
      if(!Number.isFinite(v.bearing))v.bearing=derivedBearing;
      if(!Number.isFinite(v.targetBearing))v.targetBearing=derivedBearing;
    }
  }
  return v;
}

function setRtVehicles(records,label){
  const prev=new Map((S.rtVehicles||[]).map(v=>[v.id,v]));
  const nowTs=performance.now();
  S.rtVehicles=records.map(rec=>buildRtVehicle(rec,prev.get(rec.id),nowTs)).filter(v=>Number.isFinite(v.lon)&&Number.isFinite(v.lat));
  updateRealtimeBar(label);
  renderInfoSlides();
  if(!S.route&&!S.didAutoFocusVehicles&&S.rtVehicles.length&&(!S.userLocation||S.userLocation.isFallback)){
    showVehiclesOverview('Показываю автобусы на карте');
  }
}

function getCurrentServiceMinutes(){
  const now=new Date();
  let mins=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  if(now.getHours()<4)mins+=1440;
  return mins;
}

// Генерирует офлайн-симуляционные ТС на основе расписания (GTFS calendar + stop_times)
function buildOfflineSimVehicles(existingRouteCounts){
  const routeCounts=existingRouteCounts instanceof Map?existingRouteCounts:new Map();
  const records=[];
  const nowMin=getCurrentServiceMinutes();
  for(const [routeId,ctx] of S.routeContextById){
    const pathData=S.routeAnimById.get(routeId)||null;
    if(!pathData||!pathData.path||pathData.path.length<2)continue;
    const route=ctx&&ctx.route||S.routeMetaById.get(routeId);
    const targetCount=Math.max(0,TARGET_VEHICLES_PER_ROUTE-(routeCounts.get(routeId)||0));
    if(!targetCount)continue;
    const activeServices=getActiveServiceIds(S.scheduleDate||toGtfsDate(new Date()));
    const activeTrips=(ctx&&ctx.simTrips||[]).filter(trip=>{
      if(!(nowMin>=trip.startMin&&nowMin<=trip.endMin))return false;
      const sid=S.tripToService&&S.tripToService.get(trip.tripTemplateId||trip.tripId.split(':')[0]);
      return !sid||activeServices.has(sid);
    }).slice(0,targetCount);
    for(const simTrip of activeTrips){
      const progress=Math.max(0,Math.min(1,(nowMin-simTrip.startMin)/Math.max(1/60,simTrip.durationMin)));
      const animTime=progress*LOOP;
      const pos=getPathPos(pathData,animTime);
      if(!pos)continue;
      records.push({
        id:'sim:'+simTrip.tripId,
        label:(route&&route.route_short_name)||routeId||'?',
        routeId,
        lon:pos[0],
        lat:pos[1],
        animTime,
        animVelocity:LOOP/Math.max(simTrip.durationMin*60000,1000),
        bearing:getBearing(pathData.path[pos[2]],pathData.path[pos[3]]),
        source:'sim',
        tripId:simTrip.tripId
      });
    }
  }
  return records;
}

// Останавливает RT-соединение и запускает симуляцию по расписанию с обновлением раз в минуту
function enableOfflineSimulation(reason){
  stopRealtime();
  rtLiveVehicleMap.clear();
  const label='Офлайн-симуляция'+(reason?(' · '+reason):'');
  const sync=()=>setRtVehicles(buildOfflineSimVehicles(),label);
  sync();
  rtPollInterval=setInterval(sync,60000);
}

function parseSnapshotEntities(data){
  return (data&&data.entity||[]).filter(e=>e.vehicle&&e.vehicle.position).map(e=>({
    id:e.vehicle.vehicle&&e.vehicle.vehicle.id||e.id,
    label:e.vehicle.vehicle&&e.vehicle.vehicle.label||'',
    lon:e.vehicle.position.longitude,
    lat:e.vehicle.position.latitude,
    bearing:e.vehicle.position.bearing,
    routeId:e.vehicle.trip&&e.vehicle.trip.routeId||'',
    source:'http'
  }));
}

async function loadRtHttpSnapshot(){
  try{
    const r=await fetch(getRtHttpUrl()+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok)return false;
    const data=await r.json();
    const records=parseSnapshotEntities(data);
    if(!records.length)return false;
    const routeCounts=new Map();
    records.forEach(rec=>routeCounts.set(rec.routeId,(routeCounts.get(rec.routeId)||0)+1));
    const supplemented=records.concat(buildOfflineSimVehicles(routeCounts));
    rtLiveVehicleMap=new Map();
    supplemented.forEach(rec=>rtLiveVehicleMap.set(rec.id,rec));
    setRtVehicles(supplemented,'Онлайн snapshot + график');
    return true;
  }catch(_){
    return false;
  }
}

function sendWsSubscription(){
  if(!rtWs||rtWs.readyState!==WebSocket.OPEN)return;
  try{
    rtWs.send(JSON.stringify({
      action:'subscribe',
      routes:[...S.routeMetaById.keys()],
      stops:[]
    }));
  }catch(_){}
}

function applyWsVehicleEvent(msg){
  if(!msg||!Number.isFinite(+msg.lat)||!Number.isFinite(+msg.lon))return;
  const rec={
    id:msg.id,
    label:msg.label||'',
    lon:+msg.lon,
    lat:+msg.lat,
    bearing:msg.bearing,
    routeId:msg.route_id||msg.routeId||'',
    source:'ws'
  };
  rtLiveVehicleMap.set(rec.id,rec);
  setRtVehicles([...rtLiveVehicleMap.values()],'Онлайн WebSocket');
}

function stopRealtime(closeSocket=true){
  if(rtPollInterval){clearInterval(rtPollInterval);rtPollInterval=null;}
  if(rtHttpFallbackTimer){clearTimeout(rtHttpFallbackTimer);rtHttpFallbackTimer=null;}
  if(rtWsReconnectTimer){clearTimeout(rtWsReconnectTimer);rtWsReconnectTimer=null;}
  if(closeSocket&&rtWs){
    try{rtWs.close();}catch(_){}
  }
  rtWs=null;
}

function startHttpPolling(){
  if(rtPollInterval)return;
  const poll=async()=>{
    const ok=await loadRtHttpSnapshot();
    if(!ok&&(!S.rtVehicles||!S.rtVehicles.length))enableOfflineSimulation('нет live snapshot');
  };
  poll();
  rtPollInterval=setInterval(poll,30000);
}

function scheduleRealtimeRetry(){
  if(rtWsReconnectTimer||!navigator.onLine)return;
  rtWsReconnectTimer=setTimeout(()=>{
    rtWsReconnectTimer=null;
    startRealtime();
  },5000);
}

function connectRealtimeWs(){
  return false; // WS temporarily disabled
  const url=getRtWsUrl();
  if(!url)return false;
  try{
    rtWs=new WebSocket(url);
  }catch(_){
    rtWs=null;
    return false;
  }
  rtWsOpenedAt=Date.now();
  updateRealtimeBar('Онлайн WS · подключение');
  rtWs.addEventListener('open',()=>{
    sendWsSubscription();
  });
  rtWs.addEventListener('message',event=>{
    let msg;
    try{msg=JSON.parse(event.data);}catch(_){return;}
    if(msg&&msg.type==='connected'){
      updateRealtimeBar('Онлайн WS · подключено');
      return;
    }
    if(msg&&msg.type==='vehicle'){
      if(rtHttpFallbackTimer){clearTimeout(rtHttpFallbackTimer);rtHttpFallbackTimer=null;}
      if(rtPollInterval){clearInterval(rtPollInterval);rtPollInterval=null;}
      applyWsVehicleEvent(msg);
    }
  });
  rtWs.addEventListener('error',()=>{
    try{rtWs&&rtWs.close();}catch(_){}
  });
  rtWs.addEventListener('close',()=>{
    rtWs=null;
    if(!navigator.onLine){
      enableOfflineSimulation('нет сети');
      return;
    }
    if(Date.now()-rtWsOpenedAt<1500)startHttpPolling();
    scheduleRealtimeRetry();
  });
  return true;
}

function startRealtime(){
  stopRealtime();
  enableOfflineSimulation();
}

function normalizeBearing(value){
  const bearing=Number.isFinite(value)?value:0;
  return ((bearing%360)+360)%360;
}

function updateCompassButton(){
  const btn=document.getElementById('compass-btn');
  const needle=document.getElementById('compass-needle');
  if(!btn||!needle)return;
  const bearing=normalizeBearing(S.viewState&&S.viewState.bearing);
  needle.style.transform='rotate('+(-bearing)+'deg)';
  btn.classList.toggle('is-active',Math.abs(bearing)>1&&Math.abs(bearing-360)>1);
}

function resetCompassOrientation(animated=true){
  const view=S.viewState||{};
  const next={
    longitude:Number.isFinite(view.longitude)?view.longitude:37.650,
    latitude:Number.isFinite(view.latitude)?view.latitude:55.708,
    zoom:Number.isFinite(view.zoom)?view.zoom:14.2,
    pitch:0,
    bearing:0,
    transitionDuration:animated?650:0
  };
  S.viewState={...view,...next};
  deckgl.setProps({initialViewState:next});
  updateCompassButton();
}

  localStorage.setItem(storageKey,'1');

function handleMapClick(info){

  }

  const lid=info&&info.layer&&info.layer.id||'';

  deckgl.setProps({initialViewState:{longitude:v.lon,latitude:v.lat,zoom:16.9,pitch:45,bearing:v.bearing||0,transitionDuration:650}});
}

// ── ANIMATION LOOP ───────────────────────────────────────────
let lastTs=null;
(function loop(ts){
  let delta=0;
  if(!S.paused){if(lastTs!==null){delta=(ts-lastTs);S.currentTime+=delta*0.12*S.animSpeed;}lastTs=ts;}else{lastTs=ts;}
  if(delta>0)advanceVehicles(delta);
  followSelectedVehicle(false);
  deckgl.setProps({layers:buildLayers()});
  if(S.tripsData) updateProgressUI();
  updateBusPin();
  requestAnimationFrame(loop);
})(0);

function buildStopList(){

    if(!S.stops||!S.stops.length) return;

      const sub=na?('~'+Math.max(0,Math.round((s.distance||0)))+' м · '+na):('~'+Math.max(0,Math.round((s.distance||0)))+' м');
      li.innerHTML='<div class="sd" id="'+id+'-dot-'+i+'">'+(i+1)+'</div><div class="si-info" onclick="openPopupByIndex('+i+')"><div class="si-name">'+escHtml(s.name)+'</div><div class="si-sub">'+sub+'</div></div>';

function nextArrival(stop){
  const nowM=new Date().getHours()*60+new Date().getMinutes();
  for(const a of stop.arrivals){
    if(parseTimeMin(a.time)>=nowM)return (a.routeShort?('№'+a.routeShort+' · '):'')+formatTime(a.time);
  }
  return stop.arrivals[0]&&stop.arrivals[0].time?((stop.arrivals[0].routeShort?('№'+stop.arrivals[0].routeShort+' · '):'')+formatTime(stop.arrivals[0].time)):null;
}

function updateProgressUI(){
  const pct=((S.currentTime%LOOP)+LOOP)%LOOP/LOOP;
  const n=S.stops.length,vidx=Math.floor(pct*(n-1)),nidx=Math.min(vidx+1,n-1);
  const ps=Math.round(pct*100)+'%';
  const nl=pct>=.99?'Конечная':S.stops[nidx]&&S.stops[nidx].name?'→ '+S.stops[nidx].name:'';
  const dp=document.getElementById('d-pfill');if(dp)dp.style.width=ps;
  const mp=document.getElementById('m-pfill');if(mp)mp.style.width=ps;
  setText('d-pct',ps);setText('m-pct',ps);setText('d-next-lbl',nl);setText('m-next-lbl',nl);
  ['d-slist','m-slist'].forEach(lid=>{
    S.stops.forEach((_,i)=>{
      const d=document.getElementById(lid+'-dot-'+i);if(!d)return;
      d.classList.remove('v','n');
      if(i<=vidx)d.classList.add('v');else if(i===nidx)d.classList.add('n');
    });
  });
}

// Форматирует объект Date в строку GTFS-даты (YYYYMMDD)
function toGtfsDate(d){
  return d.getFullYear().toString()+(d.getMonth()+1).toString().padStart(2,'0')+d.getDate().toString().padStart(2,'0');
}
// Возвращает Set активных service_id для заданной GTFS-даты по таблице calendar
function getActiveServiceIds(gtfsDateStr){
  const dayNames=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const d=new Date(gtfsDateStr.slice(0,4)+'-'+gtfsDateStr.slice(4,6)+'-'+gtfsDateStr.slice(6,8));
  const dow=dayNames[d.getDay()];
  const active=new Set();
  const cal=S.calendarByServiceId||new Map();
  for(const [sid,row] of cal){
    if(row[dow]==='1'&&gtfsDateStr>=row.start_date&&gtfsDateStr<=row.end_date)active.add(sid);
  }
  if(!active.size)for(const sid of cal.keys())active.add(sid);
  return active;
}

}

// Открывает попап остановки с ближайшими рейсами по расписанию
function openPopup(stop,sx,sy){
  setText('pop-sname',stop.name);
  setText('pop-code',stop.code?'Код: '+stop.code:'ID: '+stop.stop_id);
  const badge=document.getElementById('pop-rbadge');
  const firstArr=stop.arrivals&&stop.arrivals[0];
  badge.textContent='🚌 '+(S.route&&S.route.shortName||(firstArr&&firstArr.routeShort)||'—');
  badge.style.background=S.route&&S.route.hex||'#2563eb';

  const dateStr=S.scheduleDate||(S.scheduleDate=toGtfsDate(new Date()));
  const nowM=S.scheduleTimePinned&&S.scheduleTimeMin!=null?S.scheduleTimeMin:(new Date().getHours()*60+new Date().getMinutes());
  if(!S.scheduleTimePinned)S.scheduleTimeMin=nowM;

  const dateInput=document.getElementById('pop-date');
  const timeInput=document.getElementById('pop-time');
  if(dateInput)dateInput.value=dateStr.slice(0,4)+'-'+dateStr.slice(4,6)+'-'+dateStr.slice(6,8);
  if(timeInput){const h=Math.floor(nowM/60),m=nowM%60;timeInput.value=h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0');}

  const timesEl=document.getElementById('pop-times');timesEl.innerHTML='';
  const arrivals=(S.arrivalsByStopId&&S.arrivalsByStopId.get(stop.stop_id))||stop.arrivals||[];
  if(!arrivals.length){
    timesEl.innerHTML='<span class="pop-no-times">Нет данных</span>';
  }else{
    const activeServices=getActiveServiceIds(dateStr);
    const filtered=arrivals.filter(a=>{
      const sid=S.tripToService&&S.tripToService.get(a.tripId);
      return !sid||activeServices.has(sid);
    });
    if(!filtered.length){
      timesEl.innerHTML='<span class="pop-no-service">Нет рейсов в этот день</span>';
    }else{
      let startIdx=filtered.findIndex(a=>a.mins>=nowM);
      if(startIdx<0)startIdx=0;
      const result=[];
      for(let i=0;i<filtered.length&&result.length<8;i++)result.push(filtered[(startIdx+i)%filtered.length]);
      let firstNext=false;
      for(const a of result){
        const isN=!firstNext&&a.mins>=nowM;if(isN)firstNext=true;
        const d=document.createElement('div');d.className='pop-time'+(isN?' next':'');d.textContent=formatTime(a.time);
        timesEl.appendChild(d);
      }
    }
  }

  const popup=document.getElementById('popup');popup.style.display='block';
  if(sx!=null&&sy!=null){
    const pw=232,ph=250,W=window.innerWidth,H=window.innerHeight;
    let x=sx+18,y=sy-ph/2;
    if(x+pw>W-20)x=sx-pw-14;if(y<16)y=16;if(y+ph>H-20)y=H-ph-20;
    popup.style.left=x+'px';popup.style.top=y+'px';
  }
}
function closePopup(){
  document.getElementById('popup').style.display='none';
  S.activeStopId=null;
  syncActiveStopPin();
  renderInfoSlides();
}

  spd.addEventListener('input',()=>{
    S.animSpeed=parseFloat(spd.value);
    document.querySelectorAll('input[type=range]').forEach(s=>s.value=S.animSpeed);
    document.querySelectorAll('#spdv,#m-spdv').forEach(s=>s.textContent=S.animSpeed.toFixed(1));
  });
}

// ── UTILS ────────────────────────────────────────────────────
function hexRgb(hex){return(hex.replace('#','')).match(/.{2}/g).map(x=>parseInt(x,16));}
function parseTimeMin(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+(m||0);}
function formatTime(t){if(!t)return'';const p=t.split(':');return p[0]+':'+p[1];}
function setText(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function escHtml(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── THEME ────────────────────────────────────────────────────

function setThemeIcon(dark){

/* ── PANEL OPEN / CLOSE ──────────────────────── */
function openPanel(){
  document.getElementById('desk-panel').classList.add('panel-open');
  document.getElementById('mob-sheet').classList.add('panel-open');
  document.getElementById('planner-btn').classList.add('is-active');

/* ── SEARCH OPEN / CLOSE ─────────────────────── */
function openSearch(e){
  const bar=document.getElementById('search-bar');
  if(bar.classList.contains('search-open'))return;
  bar.classList.add('search-open');
  const clear=document.getElementById('search-clear');
  if(clear)clear.classList.add('visible');
  setTimeout(()=>document.getElementById('search-input').focus(),200);
  openPanel();
  setPanelMode('routes');
}
function closeSearch(e){
  if(e)e.stopPropagation();
  const bar=document.getElementById('search-bar');
  bar.classList.remove('search-open');
  const inp=document.getElementById('search-input');
  const clear=document.getElementById('search-clear');
  if(inp)inp.value='';
  if(clear)clear.classList.remove('visible');
  filterRoutes('');
  if(!S.route)closePanel();
}

function onSearchInput(val){
  const lq=val.trim().toLowerCase();
  if(!lq){filterRoutes('');buildStopList();return;}
  const words=lq.split(/\s+/).filter(Boolean);
  const haystack=r=>(r.route_short_name||'')+' '+(r.route_long_name||'');
  const routeCount=allRoutesCache.filter(r=>matchesQuery(haystack(r),words)).length;
  const stopSource=S.allStops&&S.allStops.length?S.allStops:[];
  const stopCount=stopSource.filter(s=>matchesQuery(s.name||'',words)).length;
  // Show whichever tab has more results; routes win on tie
  if(stopCount>routeCount){
    setPanelMode('stops');
    filterStops(val);
  } else {
    setPanelMode('routes');
    filterRoutes(val);
    filterStops(val);
  }
}
function clearSearch(){
  closeSearch(null);
}

  const saved=localStorage.getItem('theme');

    document.documentElement.classList.add('dark');
  }

})();


// ── СПЛЭШ: ВЫБОР ЯЗЫКА ───────────────────────────────────────
window.splashSelectedLang=localStorage.getItem('kamchatka.transport.lang')||'ru';

function selectLang(lang,btn){
  window.splashSelectedLang=lang;
  document.querySelectorAll('.splash-lang').forEach(b=>b.classList.remove('selected'));
  if(btn)btn.classList.add('selected');
  const startBtn=document.getElementById('splash-start');
  if(startBtn)startBtn.textContent={ru:'Продолжить →',en:'Continue →',zh:'继续 →',ja:'続行 →'}[lang]||'Continue →';
  const titleEl=document.getElementById('splash-title');
  if(titleEl)titleEl.textContent=(I18N[lang]&&I18N[lang]['splash.title'])||I18N.ru['splash.title'];
  const subEl=document.getElementById('splash-sub');
  if(subEl)subEl.textContent=(I18N[lang]&&I18N[lang]['splash.subtitle'])||I18N.ru['splash.subtitle'];
}

function showSplash(){
  const splash=document.getElementById('splash');
  if(!splash)return;
  // Сброс состояния загрузки
  const ldEl=document.getElementById('splash-loading');
  const langsEl=document.getElementById('splash-langs');
  const startBtn=document.getElementById('splash-start');
  if(ldEl)ldEl.classList.remove('show');
  if(langsEl)langsEl.classList.remove('hide');
  if(startBtn){startBtn.classList.remove('hide');startBtn.disabled=false;}
  splash.style.display='flex';
}

async function startFromSplash(){
  const lang=window.splashSelectedLang||'ru';
  currentLang=lang;
  localStorage.setItem('kamchatka.transport.lang',lang);
  applyI18n();

  const langsEl=document.getElementById('splash-langs');
  const startBtn=document.getElementById('splash-start');
  const ldEl=document.getElementById('splash-loading');
  const ldText=document.getElementById('splash-ld-text');
  const ldFill=document.getElementById('splash-ld-fill');
  const ldErr=document.getElementById('splash-ld-err');
  const retryBtn=document.getElementById('splash-retry');

  if(langsEl)langsEl.classList.add('hide');
  if(startBtn)startBtn.classList.add('hide');
  if(ldEl)ldEl.classList.add('show');
  if(ldErr)ldErr.classList.remove('show');
  if(retryBtn)retryBtn.classList.remove('show');

  const setP=(p,t)=>{if(ldFill)ldFill.style.width=p+'%';if(ldText)ldText.textContent=t||'Загрузка…';};
  const showErr=(msg)=>{if(ldErr){ldErr.textContent=msg;ldErr.classList.add('show');}if(retryBtn)retryBtn.classList.add('show');if(ldFill)ldFill.style.width='0%';};

  try{
    setP(5,'Подключение к серверу…');
    // Замените YOUR_USER/YOUR_REPO на ваш GitHub-аккаунт и репозиторий
    const GTFS_REPO='https://raw.githubusercontent.com/YOUR_USER/YOUR_REPO/main/feeds';
    const GTFS_FEEDS={ru:GTFS_REPO+'/gtfs-ru.zip',en:GTFS_REPO+'/gtfs-en.zip',zh:GTFS_REPO+'/gtfs-zh.zip',ja:GTFS_REPO+'/gtfs-ja.zip'};
    const url=GTFS_FEEDS[lang]||GTFS_FEEDS.ru;
    let files;
    // Сначала пробуем локальную папку ./gtfs/ (для разработки)
    try{
      files=await loadFilesFromFolder((p,t)=>setP(5+p*.6,t));
    }catch(_){
      // Загружаем с GitHub
      setP(10,'Загрузка расписания с сервера…');
      const resp=await fetch(url);
      if(!resp.ok)throw new Error(`HTTP ${resp.status}: ${url}`);
      const total=+resp.headers.get('content-length')||0;
      const reader=resp.body.getReader();
      const chunks=[];let received=0;
      while(true){
        const{done,value}=await reader.read();
        if(done)break;
        chunks.push(value);received+=value.length;
        if(total)setP(10+Math.round(received/total*50),'Загрузка… '+Math.round(received/1024)+'КБ');
      }
      const buf=new Uint8Array(received);let pos=0;
      for(const c of chunks){buf.set(c,pos);pos+=c.length;}
      setP(62,'Распаковка архива…');
      files=await loadFilesFromZip(buf.buffer,(p,t)=>setP(62+p*.34,t));
    }
    setP(98,'Применение данных…');
    await onFilesReady(files);
    // Скрываем сплэш
    const splash=document.getElementById('splash');
    if(splash)splash.style.display='none';
  }catch(e){
    showErr('❌ Ошибка загрузки: '+e.message+'\n\nПроверьте интернет-соединение или повторите попытку.');
  }
}

// ── BOOT ─────────────────────────────────────────────────────
try{(function boot(){
  const saved=localStorage.getItem('kamchatka.transport.lang');
  const lang=saved||'ru';
  window.splashSelectedLang=lang;
  currentLang=lang;
  document.querySelectorAll('.splash-lang').forEach(btn=>{
    const m=btn.getAttribute('onclick')&&btn.getAttribute('onclick').match(/selectLang\('(\w+)'/);
    if(m&&m[1]===lang)btn.classList.add('selected');
    else btn.classList.remove('selected');
  });
  const startBtn=document.getElementById('splash-start');
  if(startBtn)startBtn.textContent={ru:'Продолжить →',en:'Continue →',zh:'继续 →',ja:'続行 →'}[lang]||'Продолжить →';
  applyI18n();

  if(saved){
    // Язык уже выбран — скрываем сплэш, сразу грузим GTFS
    const splash=document.getElementById('splash');
    if(splash)splash.style.display='none';
    startFromSplash();
  }
  // Если saved===null — сплэш остаётся виден (первый запуск)
})();}catch(e){window._bootErr=e.toString()+" "+e.stack;}
// Разблокируем кнопку - скрипт полностью инициализирован
(function(){var b=document.getElementById('splash-start');if(b){b.disabled=false;}})();
</script>
