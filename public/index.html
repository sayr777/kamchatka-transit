/* ── CSS СТИЛИ ──────────────────────────────────── */
<style>
:root{
  /* ── Цвета 60/30/10 ── */
  --bg:#F2F2F7;--panel:#FFFFFF;--border:#E5E5EA;
  --t1:#1C1C1E;--t2:#636366;--t3:#AEAEB2;
  --acc:#FC3F1D;--acc2:#FF6B4A;--ok:#34C759;--info:#3B7EFF;--warn:#FF9500;
  /* ── Скругления ── */
  --r:12px;--r-sm:8px;--r-lg:16px;--r-xl:20px;
  /* ── Тени ── */
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --sh-up:0 -1px 3px rgba(0,0,0,.06),0 -4px 12px rgba(0,0,0,.04);
  /* ── Типографика ── */
  --head:'Unbounded',system-ui,sans-serif;
  --body:'Golos Text',system-ui,sans-serif;
  --fs-xl:22px;--fs-lg:17px;--fs-md:15px;--fs-sm:13px;--fs-xs:11px;
  --lh:1.5;
  /* ── Анимации ── */
  --ease:.18s cubic-bezier(.4,0,.2,1);
  /* ── Раскладка ── */
  --panel-w:320px;--sheet-peek:88px;--sheet-full:82vh;
}

/* ── DARK THEME ──────────────────────────────── */
html.dark{
  --bg:#18181B;--panel:#1E1E22;--border:#3A3A40;
  --t1:#F5F5F7;--t2:#8E8E93;--t3:#48484A;
  --sh:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.35);
  --sh-up:0 -1px 3px rgba(0,0,0,.3),0 -4px 12px rgba(0,0,0,.25);
  --ok:#30D158;--info:#4E90FF;
}
html.dark .sd{background:#252525;border-color:var(--border)}
html.dark .pop-time{background:#333}
html.dark .stop-hover-card{background:rgba(37,37,37,.97);border-color:#444;color:#F0F0F0}
html.dark .stop-hover-card-title{color:#F0F0F0}
html.dark .stop-pin-dot{background:#252525;border-color:var(--acc)}
html.dark .bus-pin-bubble{background:rgba(26,26,26,.45)}
html.dark input[type=range]{background:var(--border)}
html.dark .ld-bar{background:var(--border)}
html.dark .modal-head{background:#2D2D2D !important;border-color:#3A3A3A !important}
html.dark .sm-dropzone{background:rgba(255,255,255,.02)}
html.dark .sm-folder-info{background:rgba(255,255,255,.03)}
html.dark .sm-url-input,.html.dark .rm-search{background:#1A1A1A}
html.dark .pop-head{background:#2D2D2D}

/* ── SEARCH BAR ────────────────────────────── */
#search-bar{
  position:absolute;top:64px;right:16px;
  z-index:50;
  width:44px;height:44px;
  background:var(--panel);
  border-radius:var(--r);
  box-shadow:var(--sh);
  display:flex;align-items:center;
  overflow:hidden;
  transition:width var(--ease),box-shadow var(--ease);
  cursor:pointer;
}
#search-bar.search-open{
  width:min(320px,calc(100vw - 76px));
  cursor:default;
  box-shadow:0 4px 24px rgba(0,0,0,.14);
}
#search-input{
  flex:1;border:none;outline:none;
  padding:0 10px;
  font-family:var(--body);font-size:var(--fs-sm);color:var(--t1);
  background:transparent;
  width:0;opacity:0;
  transition:opacity .15s .08s;
  pointer-events:none;
  min-width:0;
}
#search-bar.search-open #search-input{
  width:auto;opacity:1;pointer-events:auto;
}
#search-input::placeholder{color:var(--t3)}
#search-icon{
  width:40px;height:40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--t2);
}
#search-clear{
  width:28px;height:28px;flex-shrink:0;margin-right:6px;
  border:none;background:var(--border);border-radius:50%;
  cursor:pointer;color:var(--t2);
  display:none;align-items:center;justify-content:center;
  flex-shrink:0;
}
#search-clear.visible{display:flex}

/* ── FLOATING BUTTONS ────────────────────────── */
#theme-toggle,#feed-btn,#locate-btn,#planner-btn,#compass-btn{
  position:absolute;z-index:50;
  width:44px;height:44px;
  background:var(--panel);
  border:none;border-radius:var(--r);
  box-shadow:var(--sh);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;
  transition:background var(--ease),box-shadow var(--ease),transform var(--ease);
  color:var(--t2);
}
#theme-toggle:focus-visible,#feed-btn:focus-visible,#locate-btn:focus-visible,
#planner-btn:focus-visible,#compass-btn:focus-visible{
  outline:2px solid var(--acc);outline-offset:2px;
}
#compass-btn{top:16px;right:16px;bottom:auto;font-size:13px;font-weight:800}
/* search-bar занимает top:64px */
#planner-btn{top:112px;right:16px;bottom:auto}
#theme-toggle{bottom:80px;right:16px;top:auto}
#feed-btn{bottom:128px;right:16px;top:auto}
#locate-btn{bottom:32px;right:16px;top:auto}
#planner-btn.is-active{background:var(--acc);color:#fff}

/* panel close button */
.panel-close-btn{
  position:absolute;top:10px;right:10px;
  width:28px;height:28px;border:none;background:var(--bg);
  border-radius:50%;cursor:pointer;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;z-index:2;
}
.panel-close-btn:hover{background:var(--border)}
.sheet-handle{position:relative}
.sheet-close-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:28px;height:28px;border:none;background:var(--bg);
  border-radius:50%;cursor:pointer;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.sheet-close-btn:hover{background:var(--border)}
#compass-btn.is-active{color:var(--acc)}
#theme-toggle:hover,#feed-btn:hover,#locate-btn:hover,#planner-btn:hover,#compass-btn:hover,#search-bar:hover:not(.search-open){background:var(--bg);box-shadow:0 4px 16px rgba(0,0,0,.18);transform:translateY(-1px)}
#theme-toggle:active,#feed-btn:active,#locate-btn:active,#planner-btn:active,#compass-btn:active{transform:scale(.94);box-shadow:var(--sh)}
.compass-face{position:relative;width:22px;height:22px;border-radius:50%;border:1.6px solid currentColor;display:flex;align-items:center;justify-content:center;line-height:1}
#compass-needle{display:block;transform-origin:center;transition:transform .18s ease}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--body);font-size:var(--fs-md);line-height:var(--lh);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#canvas{position:fixed;inset:0;width:100vw;height:100vh}

/* shared components */
.route-badge-wrap{display:inline-flex;align-items:center;gap:6px;background:var(--acc);color:#fff;padding:4px 12px 4px 9px;border-radius:6px;font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:.01em;white-space:nowrap}
.route-name-txt{font-family:var(--head);font-size:13px;font-weight:600;color:var(--t1);line-height:1.3}
.route-meta-txt{font-size:11px;color:var(--t3)}
.sl{list-style:none}
.si{display:flex;align-items:flex-start;gap:10px;padding:4px 0;position:relative}
.si:not(:last-child)::after{content:'';position:absolute;left:9.5px;top:23px;width:2px;height:calc(100% - 3px);background:var(--border);z-index:0}
.sd{width:21px;height:21px;flex-shrink:0;border-radius:50%;background:#fff;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--t3);position:relative;z-index:1;transition:all .25s}
.sd.v{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(232,69,37,.38)}
.sd.n{border-color:var(--acc);color:var(--acc);animation:pd 1.5s ease-in-out infinite}
@keyframes pd{0%{box-shadow:0 0 0 0 rgba(232,69,37,.4)}70%{box-shadow:0 0 0 5px rgba(232,69,37,0)}100%{box-shadow:0 0 0 0 rgba(232,69,37,0)}}
.si-info{padding-top:1px;cursor:pointer}
.si-name{font-size:12px;color:var(--t1);font-weight:500;line-height:1.3;transition:color .15s}
.si-name:hover{color:var(--acc)}
.si-sub{font-size:10px;color:var(--t3);margin-top:1px}
.dv{height:1px;background:var(--border);margin:12px 0}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-head span:first-child{font-size:11px;color:var(--t2);font-weight:500}
.prog-head span:last-child{font-size:11px;color:var(--acc);font-weight:700;font-family:var(--head)}
.prog-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;transition:width .05s linear}
.ctrl{margin-top:12px;display:flex;align-items:center;gap:9px}
.btn-pp{width:30px;height:30px;flex-shrink:0;background:var(--acc);border:none;border-radius:50%;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(232,69,37,.38);transition:transform .15s}
.btn-pp:hover{transform:scale(1.1)}
.spw{flex:1;display:flex;align-items:center;gap:6px}
.spw>span{font-size:10.5px;color:var(--t3)}
.spw>span:last-child{color:var(--acc);font-weight:700;min-width:26px;text-align:right;font-family:var(--head);font-size:10px}
input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 2px 5px rgba(232,69,37,.38)}
.planner-card{margin-top:14px;padding:14px 14px 12px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(244,245,248,.94));border:1px solid rgba(17,24,39,.08);box-shadow:0 10px 28px rgba(17,24,39,.08);display:flex;flex-direction:column;gap:12px}
.planner-card.is-empty{opacity:.96}
.planner-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.planner-title{font-size:13px;font-weight:800;color:var(--t1);line-height:1.3}
.planner-subtitle{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.45}
.planner-pill{padding:5px 10px;border-radius:999px;background:rgba(37,99,235,.08);color:#2563eb;font-size:10px;font-weight:700;white-space:nowrap}
.planner-pill.is-transfer{background:rgba(232,69,37,.1);color:var(--acc)}
.planner-points{display:flex;flex-direction:column;gap:8px}
.planner-point{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.72);cursor:pointer;transition:border-color .16s ease,transform .16s ease,box-shadow .16s ease}
.planner-point:hover{transform:translateY(-1px);border-color:rgba(37,99,235,.28);box-shadow:0 6px 18px rgba(15,23,42,.06)}
.planner-point.is-pending{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.planner-point-badge{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.planner-point-badge.from{background:#0ea5e9}
.planner-point-badge.to{background:#ef4444}
.planner-point-copy{min-width:0;flex:1}
.planner-point-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.planner-point-value{font-size:12px;color:var(--t1);font-weight:700;line-height:1.35;margin-top:2px}
.planner-point-meta{font-size:10px;color:var(--t2);line-height:1.45;margin-top:2px}
.planner-actions{display:flex;flex-wrap:wrap;gap:8px}
.planner-action,.planner-build-btn{border:none;border-radius:999px;padding:9px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,background .15s ease}
.planner-action{background:rgba(17,24,39,.06);color:var(--t1)}
.planner-action:hover,.planner-build-btn:hover{transform:translateY(-1px)}
.planner-build-btn{background:linear-gradient(135deg,var(--acc),#ff7a59);color:#fff;box-shadow:0 8px 20px rgba(232,69,37,.2)}
.planner-build-btn[disabled]{cursor:not-allowed;opacity:.5;transform:none;box-shadow:none}
.planner-hint{font-size:10.5px;color:var(--t2);line-height:1.5}
.planner-status{padding:10px 12px;border-radius:12px;background:rgba(37,99,235,.06);font-size:11px;color:#1d4ed8;line-height:1.45}
.planner-status.is-error{background:rgba(220,38,38,.08);color:#b91c1c}
.planner-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.planner-summary-item{padding:10px;border-radius:12px;background:rgba(17,24,39,.05)}
.planner-summary-label{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.planner-summary-value{font-size:13px;color:var(--t1);font-weight:800;line-height:1.3;margin-top:4px}
.planner-legs{display:flex;flex-direction:column;gap:8px}
.planner-leg{padding:11px 12px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.72)}
.planner-leg-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.planner-leg-mode{font-size:11px;font-weight:800;color:var(--t1)}
.planner-leg-time{font-size:11px;font-weight:700;color:var(--t2);white-space:nowrap}
.planner-leg-route{display:inline-flex;align-items:center;gap:6px;margin-top:7px;padding:4px 9px;border-radius:999px;color:#fff;font-size:11px;font-weight:800}
.planner-leg-copy{font-size:10.5px;color:var(--t2);line-height:1.55;margin-top:7px}
.planner-leg-copy strong{color:var(--t1)}
.planner-empty{font-size:11px;color:var(--t2);line-height:1.55;padding:10px 0 2px}
html.dark .planner-card{background:linear-gradient(180deg,rgba(40,38,52,.94),rgba(26,24,35,.92));border-color:rgba(255,255,255,.08);box-shadow:0 14px 36px rgba(0,0,0,.3)}
html.dark .planner-point,html.dark .planner-leg{background:rgba(255,255,255,.03)}
html.dark .planner-summary-item{background:rgba(255,255,255,.05)}
html.dark .planner-action{background:rgba(255,255,255,.08);color:var(--t1)}
html.dark .planner-pill{background:rgba(96,165,250,.16);color:#93c5fd}
html.dark .planner-pill.is-transfer{background:rgba(248,113,113,.14);color:#fca5a5}
.rt-bar{margin-top:10px;padding:8px 10px;border-radius:10px;background:rgba(42,157,108,.08);border:1px solid rgba(42,157,108,.2);font-size:10.5px;color:var(--ok);display:none;align-items:center;gap:6px}
.rt-bar.show{display:flex}
.compact-hide{display:none !important}
.route-params{display:flex;flex-direction:column;gap:12px}.param-row{padding:10px 0;border-bottom:1px solid var(--border)}.param-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}.param-value{font-size:14px;color:var(--t1);font-weight:600;line-height:1.35}.param-sub{font-size:11px;color:var(--t2);margin-top:2px}.panel-tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:2px solid var(--border)}.panel-tab{padding:10px 16px;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:transparent;color:var(--t2);font-weight:600;font-size:13px;cursor:pointer;transition:color .15s,border-color .15s}.panel-tab.active{color:var(--acc);border-bottom-color:var(--acc)}.panel-view{display:none}.panel-view.active{display:block}.route-list-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:8px;border-bottom:none;cursor:pointer;transition:background .15s}.route-list-item:hover{background:var(--bg)}.route-list-pill{min-width:36px;height:24px;padding:0 8px;border-radius:6px;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}.route-list-main{flex:1;min-width:0}.route-list-name{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3}.route-list-sub{font-size:11px;color:var(--t3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.route-list-empty{font-size:12px;color:var(--t3);padding:6px 0 4px}.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:170px;padding:22px 16px;text-align:center;color:var(--t2);animation:emptyFade .24s ease-out}.empty-state__icon{width:58px;height:58px;border-radius:18px;border:1px solid var(--border);background:linear-gradient(180deg,#fff,#f5f1ea);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(0,0,0,.08);animation:emptyFloat 2.2s ease-in-out infinite}.empty-state__icon svg{width:34px;height:34px;stroke:#111;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}.empty-state__title{font-family:var(--head);font-size:13px;color:var(--t1)}.empty-state__text{font-size:11.5px;line-height:1.45;max-width:230px}.empty-state__text small{display:block;margin-top:4px;color:var(--t3)}@keyframes emptyFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}@keyframes emptyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}.#chip{display:none!important}
.info-slides{display:flex;flex-direction:column;gap:10px}
.info-slides-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.info-slides-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.info-slides-nav{display:flex;align-items:center;gap:6px}
.info-slide-arrow{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .16s ease}
.info-slide-arrow:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-1px)}
.info-slides-window{overflow:hidden}
.info-slides-track{display:flex;transition:transform .28s ease}
.info-slide{min-width:100%;display:flex;flex-direction:column;gap:12px}
.info-slide-card{padding:15px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(255,255,255,.52));border:1px solid rgba(17,24,39,.08);box-shadow:0 12px 28px rgba(0,0,0,.08)}
.info-slide-top{display:flex;align-items:flex-start;gap:12px}
.info-slide-badge{min-width:44px;height:30px;padding:0 10px;border-radius:999px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 8px 16px rgba(0,0,0,.14)}
.info-slide-main{flex:1;min-width:0}
.info-slide-kicker{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.info-slide-title{font-size:15px;font-weight:800;color:var(--t1);line-height:1.25;margin-top:4px}
.info-slide-meta{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.45}
.info-slide-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.info-slide-row{padding:10px 11px;border-radius:14px;background:rgba(17,24,39,.04);border:1px solid rgba(17,24,39,.05)}
.info-slide-row-label{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.info-slide-row-value{font-size:12.5px;color:var(--t1);font-weight:700;line-height:1.35}
.info-slide-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.info-slide-chip{padding:5px 10px;border-radius:999px;background:rgba(232,69,37,.08);border:1px solid rgba(232,69,37,.16);font-size:10.5px;color:var(--t1);font-weight:700;line-height:1}
.info-slide-dots{display:flex;justify-content:center;gap:6px}
.info-slide-dot{width:8px;height:8px;border-radius:50%;border:none;background:rgba(17,24,39,.14);cursor:pointer;padding:0;transition:all .16s ease}
.info-slide-dot.active{width:24px;border-radius:999px;background:var(--acc)}
.info-slides-empty{padding:14px;border-radius:18px;border:1px dashed var(--border);font-size:12px;color:var(--t3);text-align:center}
.route-card-progress{margin-top:12px}
.route-card-progress-top{display:flex;justify-content:space-between;gap:10px;font-size:11px;color:var(--t2);margin-bottom:6px}
.route-card-track{height:8px;border-radius:999px;background:rgba(17,24,39,.08);overflow:hidden}
.route-card-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--acc),#ffb347)}
.route-timeline{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:260px;overflow:auto;padding-right:2px}
.route-timeline-item{display:flex;align-items:flex-start;gap:10px}
.route-timeline-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:#fff;flex-shrink:0;margin-top:4px}
.route-timeline-dot.is-done{background:var(--acc);border-color:var(--acc)}
.route-timeline-dot.is-next{border-color:var(--acc);box-shadow:0 0 0 4px rgba(232,69,37,.12)}
.route-timeline-copy{min-width:0;flex:1}
.route-timeline-title{font-size:12.5px;color:var(--t1);font-weight:700;line-height:1.35}
.route-timeline-sub{font-size:10.5px;color:var(--t3);margin-top:2px}
.info-board{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.info-board-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 10px;border-radius:12px;background:rgba(17,24,39,.04);border:1px solid rgba(17,24,39,.05)}
.info-board-route{font-size:11px;font-weight:800;color:var(--t1)}
.info-board-time{font-size:11px;color:var(--t2)}
.info-muted{font-size:11px;color:var(--t3);line-height:1.45}
.info-slide-body{margin-top:12px;display:flex;flex-direction:column;gap:12px}
.info-slide-section{padding:12px;border-radius:14px;background:rgba(17,24,39,.035);border:1px solid rgba(17,24,39,.05)}
.info-slide-section-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:8px}
.info-link-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.info-link-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 11px;border-radius:999px;border:1px solid rgba(232,69,37,.16);background:rgba(232,69,37,.08);color:var(--t1);font-size:11px;font-weight:800;line-height:1;cursor:pointer;transition:transform .16s ease,background .16s ease,border-color .16s ease}
.info-link-btn:hover{transform:translateY(-1px);background:rgba(232,69,37,.12);border-color:rgba(232,69,37,.24)}
.info-link-btn.is-disabled{opacity:.48;cursor:default;transform:none}
.info-link-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.7);font-size:11px;flex-shrink:0}
html.dark .info-slide-card{background:linear-gradient(180deg,rgba(37,36,49,.92),rgba(24,23,34,.88));border-color:rgba(255,255,255,.06)}
html.dark .info-slide-row{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.05)}
html.dark .info-slide-dot{background:rgba(255,255,255,.18)}
html.dark .route-card-track{background:rgba(255,255,255,.08)}
html.dark .route-timeline-dot{background:#1c1b24}
html.dark .info-board-row{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.05)}
html.dark .info-slide-section{background:rgba(255,255,255,.035);border-color:rgba(255,255,255,.05)}
html.dark .info-link-icon{background:rgba(255,255,255,.12)}
.rt-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0;animation:pd2 2s ease-in-out infinite}
@keyframes pd2{0%{box-shadow:0 0 0 0 rgba(42,157,108,.5)}70%{box-shadow:0 0 0 5px rgba(42,157,108,0)}100%{box-shadow:0 0 0 0 rgba(42,157,108,0)}}
.route-list-item{cursor:pointer;border-radius:16px;transition:background .18s ease,transform .18s ease,box-shadow .18s ease}
.route-list-item:hover{background:rgba(17,24,39,.04);transform:translateY(-1px)}
.route-list-item.is-selected{background:rgba(232,69,37,.08);box-shadow:inset 0 0 0 1px rgba(232,69,37,.22)}
.route-list-indicator{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--t3);flex-shrink:0;transition:all .18s ease}
.route-list-item.is-selected .route-list-indicator{background:var(--acc);border-color:var(--acc);color:#fff}
.route-selection-card{padding:14px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.38));border:1px solid rgba(232,69,37,.16);box-shadow:0 10px 28px rgba(0,0,0,.08);animation:routeCardIn .24s ease-out}
.route-selection-head{display:flex;align-items:flex-start;gap:10px}
.route-selection-badge{min-width:42px;height:28px;padding:0 10px;border-radius:999px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 6px 16px rgba(0,0,0,.14)}
.route-selection-main{min-width:0;flex:1}
.route-selection-title{font-size:13px;font-weight:700;color:var(--t1);line-height:1.3}
.route-selection-meta{font-size:11px;color:var(--t2);margin-top:3px}
.route-selection-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.route-selection-chip{padding:5px 10px;border-radius:999px;border:1px solid currentColor;background:transparent;font-size:10.5px;font-weight:700;line-height:1}
.route-selection-chip--muted{color:var(--t3);border-color:var(--border)}
@keyframes routeCardIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
html.dark .route-list-item:hover{background:rgba(255,255,255,.04)}
html.dark .route-selection-card{background:linear-gradient(180deg,rgba(40,38,52,.92),rgba(26,24,35,.88));border-color:rgba(255,255,255,.08)}

/* desktop panel */
#desk-panel{position:absolute;top:16px;left:16px;width:var(--panel-w);max-height:calc(100vh - 32px);background:var(--panel);border-radius:var(--r);border:none;box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden}
.ph{padding:16px 16px 0;flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border)}
.ph .route-badge-wrap{margin-bottom:10px}
.ph .route-name-txt{margin-bottom:3px}
.ph .route-meta-txt{margin-bottom:14px}
.pb{padding:12px 16px;overflow-y:auto;flex:1}
.pb::-webkit-scrollbar{width:4px}
.pb::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
html.dark .ph{background:var(--panel);border-color:var(--border)}

/* mobile bottom sheet */
#mob-sheet{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--panel);border-radius:16px 16px 0 0;box-shadow:0 -2px 12px rgba(0,0,0,.12);display:flex;flex-direction:column;height:var(--sheet-peek);transition:height .35s cubic-bezier(.32,.72,0,1);touch-action:none;will-change:height}
#mob-sheet.expanded{height:var(--sheet-full)}
.sheet-handle{display:flex;justify-content:center;align-items:center;padding:10px 0 6px;flex-shrink:0;cursor:grab;touch-action:none}
.sheet-handle::before{content:'';width:32px;height:3px;background:var(--border);border-radius:2px}
.sheet-peek-row{padding:0 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer}
.sheet-peek-row .route-badge-wrap{flex-shrink:0}
.peek-info{flex:1;min-width:0}
.peek-name{font-size:14px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--head)}
.peek-meta{font-size:11px;color:var(--t3);margin-top:2px}
.peek-chevron{font-size:18px;color:var(--t3);flex-shrink:0;transition:transform .3s;line-height:1;padding-bottom:2px}
#mob-sheet.expanded .peek-chevron{transform:rotate(180deg)}
.sheet-body{flex:1;overflow-y:auto;padding:4px 16px 24px;overscroll-behavior:contain;opacity:0;transition:opacity .2s .05s;pointer-events:none}
#mob-sheet.expanded .sheet-body{opacity:1;pointer-events:auto}
.sheet-body::-webkit-scrollbar{width:3px}
.sheet-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* responsive – panels hidden by default, shown via .panel-open */
@media(min-width:640px){
  #desk-panel{display:none}
  #desk-panel.panel-open{display:flex}
  #mob-sheet{display:none}
}
@media(max-width:639px){
  #desk-panel{display:none}
  #mob-sheet{display:flex;height:0;overflow:hidden}
  #mob-sheet.panel-open{height:var(--sheet-peek)}
  #mob-sheet.panel-open.expanded{height:var(--sheet-full)}
  /* мобильные FAB: сдвигаем вправо к краю */
  #compass-btn,#search-bar,#planner-btn{right:12px}
  #theme-toggle,#feed-btn,#locate-btn{right:12px}
  /* сплэш: кнопки языка чуть меньше на узком экране */
  .splash-lang{padding:10px 6px}
  .splash-lang-flag{font-size:24px}
  .splash-lang-name{font-size:11px}
  .splash-lang-native{font-size:9px}
  .splash-card{padding:20px 16px calc(12px + env(safe-area-inset-bottom))}
  /* bottom sheet не перекрывает FAB кнопки снизу */
  #mob-sheet.panel-open{padding-bottom:env(safe-area-inset-bottom)}
}

/* bus pin */
.bus-pin{position:absolute;pointer-events:none;user-select:none;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;z-index:12}
.bus-marker{position:relative;display:flex;flex-direction:column;align-items:center}
.bus-marker-svg{display:none}
.bus-marker-pill{min-width:32px;max-width:72px;padding:5px 10px;border-radius:8px;background:var(--pin-color,#FC3F1D);border:2.5px solid #fff;color:#fff;font-family:var(--body);font-size:11px;font-weight:700;line-height:1;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.22)}

/* stop pin */
.stop-pin{position:absolute;pointer-events:auto;user-select:none;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;transform:translate(0,-100%)}
.stop-hover-card{display:none;position:absolute;left:22px;top:-14px;min-width:180px;max-width:280px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;box-shadow:0 4px 16px rgba(0,0,0,.14);z-index:2}
.stop-pin:hover .stop-hover-card,.stop-pin:focus-within .stop-hover-card,.stop-pin.is-active .stop-hover-card{display:block}
.stop-hover-card-title{font-size:12px;line-height:1.35;font-weight:600;color:var(--t1);word-break:break-word}
.stop-pin-dot{
  width:var(--stop-dot-size,14px);height:var(--stop-dot-size,14px);border-radius:50%;
  background:#fff;border:var(--stop-dot-border,2.5px) solid var(--acc);
  box-shadow:0 1px 4px rgba(0,0,0,.2);margin-left:8px;flex-shrink:0;position:relative;z-index:1;
  transition:width .16s ease,height .16s ease,border-width .16s ease,margin-left .16s ease,box-shadow .16s ease,transform .16s ease;
}
.stop-pin:hover .stop-pin-dot,.stop-pin:focus-within .stop-pin-dot,.stop-pin.is-active .stop-pin-dot{
  width:var(--stop-dot-size-active,18px);height:var(--stop-dot-size-active,18px);
  border-width:var(--stop-dot-border-active,3.5px);margin-left:calc(var(--stop-dot-margin-left,8px) - 2px);
  box-shadow:0 2px 8px rgba(252,63,29,.3);transform:translate(-2px,-2px);
}

/* labels container */
#labels-container{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:10}

/* popup */
#popup{position:absolute;display:none;z-index:300;width:240px;background:var(--panel);border-radius:12px;border:none;box-shadow:0 4px 20px rgba(0,0,0,.16);overflow:hidden}
.pop-head{padding:12px 14px 10px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pop-stop-name{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3;font-family:var(--head)}
.pop-close{width:22px;height:22px;flex-shrink:0;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:13px;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:background .15s}
.pop-close:hover{background:var(--border)}
.pop-body{padding:10px 14px 12px}
.pop-route-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 8px;border-radius:6px;font-family:var(--head);font-size:11px;font-weight:700;margin-bottom:10px;background:var(--acc);color:#fff}
.pop-times-label{font-size:10px;color:var(--t3);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.pop-times{display:flex;flex-wrap:wrap;gap:4px}
.pop-time{padding:4px 9px;border-radius:6px;background:var(--bg);border:1px solid var(--border);font-size:11px;color:var(--t1);font-weight:500}
.pop-time.next{background:rgba(252,63,29,.07);border-color:rgba(252,63,29,.25);color:var(--acc)}
.pop-no-times{font-size:11px;color:var(--t3)}
.pop-code{font-size:9.5px;color:var(--t3);margin-top:8px}
#veh-popup{position:absolute;display:none;z-index:300;width:220px;background:var(--panel);border-radius:12px;border:none;box-shadow:0 4px 20px rgba(0,0,0,.16);overflow:hidden}
html.dark #veh-popup .pop-head{background:#2D2D2D}
.pop-date-row{display:flex;gap:5px;margin-bottom:8px;margin-top:2px}
.pop-date-row input{flex:1;min-width:0;border:1px solid var(--border);border-radius:6px;padding:3px 5px;font-size:11px;color:var(--t1);background:var(--bg);font-family:var(--body);outline:none;cursor:pointer}
.pop-date-row input:focus{border-color:var(--acc)}
html.dark .pop-date-row input{background:#333;color:var(--t1);border-color:var(--border)}
.pop-no-service{font-size:11px;color:var(--t3);font-style:italic}

/* chip */
#chip{position:absolute;top:72px;left:50%;transform:translateX(-50%);background:var(--panel);padding:8px 14px;border-radius:8px;font-family:var(--body);font-size:12px;font-weight:500;color:var(--t1);box-shadow:var(--sh);border:none;display:flex;align-items:center;gap:8px;pointer-events:none;transition:background .3s,color .3s;white-space:nowrap}
.chip-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);animation:pd 1.8s ease-in-out infinite}

/* loading */
#loading{position:fixed;inset:0;z-index:999;background:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ld-bus{font-size:48px}
.ld-text{font-family:var(--body);font-size:14px;color:var(--t2)}
.ld-bar{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;width:0%;background:var(--acc);border-radius:2px;transition:width .4s ease}

/* ══ МОБИЛЬНЫЕ SAFE AREAS ══════════════════════════════════════ */
body{padding-bottom:env(safe-area-inset-bottom);padding-top:env(safe-area-inset-top)}
#deck-canvas,#map-labels{padding-bottom:0}
#compass-btn{top:calc(12px + env(safe-area-inset-top))}
#search-bar{top:calc(60px + env(safe-area-inset-top))}
#planner-btn{top:calc(108px + env(safe-area-inset-top))}
#theme-toggle{bottom:calc(80px + env(safe-area-inset-bottom))}
#feed-btn{bottom:calc(128px + env(safe-area-inset-bottom))}
#locate-btn{bottom:calc(32px + env(safe-area-inset-bottom))}

/* ══ СПЛЭШ — ВЫБОР ЯЗЫКА И ЗАГРУЗКА ═══════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:4000;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:0 0 env(safe-area-inset-bottom);
  overflow:hidden;
  /* Картинка + градиент снизу в одном background — никаких лишних слоёв */
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,.08) 45%,
      rgba(0,0,0,.55) 78%,
      rgba(0,0,0,.72) 100%
    ),
    url('./splash-bg.png') center/cover no-repeat,
    #1a3a6b;
}
.splash-bg{display:none}
#splash::before{content:none}
#splash::after{content:none}
/* Карточка с контентом снизу */
.splash-card{
  position:relative;z-index:2;
  width:100%;
  background:rgba(255,255,255,.93);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:28px 28px 0 0;
  padding:28px 20px calc(16px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 40px rgba(0,0,0,.25);
  display:flex;flex-direction:column;align-items:center;
}
/* Заголовок на фоне пейзажа */
.splash-hero{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-bottom:40vh;
  z-index:2;pointer-events:none;
}
.splash-logo{display:none}
.splash-title{
  font-family:var(--head);font-size:clamp(26px,8vw,42px);font-weight:800;
  color:#fff;text-align:center;
  letter-spacing:-.02em;padding:0 20px;
  text-shadow:0 2px 20px rgba(0,0,0,.8),0 1px 6px rgba(0,0,0,.6);
}
.splash-sub{
  font-size:13px;color:rgba(255,255,255,.9);text-align:center;
  margin-top:8px;line-height:1.5;padding:0 16px;
  text-shadow:0 1px 6px rgba(0,0,0,.6);
}
.splash-langs{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  width:100%;margin-bottom:16px;
}
.splash-lang{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 10px;border-radius:16px;
  border:2px solid #E5E5EA;
  background:#F2F2F7;
  cursor:pointer;transition:all var(--ease);font-family:var(--head);
}
.splash-lang:hover{border-color:var(--acc);background:#fff}
.splash-lang:active{transform:scale(.96)}
.splash-lang.selected{border-color:var(--acc);background:rgba(252,63,29,.06)}
.splash-lang-flag{font-size:28px;line-height:1}
.splash-lang-name{font-size:12px;font-weight:700;color:#1C1C1E}
.splash-lang-native{font-size:10px;color:#8E8E93}
.splash-start{
  width:100%;padding:17px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#FC3F1D 0%,#FF6B4A 100%);
  color:#fff;font-family:var(--head);font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.01em;
  box-shadow:0 6px 24px rgba(252,63,29,.38);
  transition:transform var(--ease),opacity var(--ease),box-shadow var(--ease);
}
.splash-start:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(252,63,29,.5)}
.splash-start:active{transform:scale(.98)}
.splash-start:disabled{opacity:.4;cursor:default;box-shadow:none;transform:none}
/* Экран загрузки внутри сплэша */
#splash-loading{display:none;flex-direction:column;align-items:center;gap:14px;width:100%}
#splash-loading.show{display:flex}
.splash-langs.hide,.splash-start.hide{display:none}
.splash-ld-icon{font-size:40px;animation:splBounce 1s ease-in-out infinite alternate}
@keyframes splBounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.splash-ld-text{font-size:14px;color:var(--t2);text-align:center}
.splash-ld-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.splash-ld-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--acc),#ff6b4a);border-radius:2px;transition:width .4s ease}
.splash-ld-err{font-size:12px;color:var(--acc);text-align:center;line-height:1.5;display:none}
.splash-ld-err.show{display:block}
.splash-retry{
  margin-top:8px;padding:10px 24px;border-radius:10px;border:none;
  background:var(--acc);color:#fff;font-family:var(--head);font-size:12px;font-weight:700;
  cursor:pointer;display:none;
}
.splash-retry.show{display:block}
/* .splash-mountains удалён — используется фото-фон */


/* ══ ROUTE MODAL ═══════════════════════════════════════════════ */
#route-modal .modal-card{
  max-width:500px;max-height:88vh;
  display:flex;flex-direction:column;
}
.rm-search-wrap{
  padding:13px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.rm-search{
  width:100%;padding:9px 13px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg);
  font-family:var(--body);font-size:13px;color:var(--t1);
  outline:none;transition:border-color .2s;
}
.rm-search:focus{border-color:var(--acc)}
.rm-count{font-size:10.5px;color:var(--t3);margin-top:7px;padding:0 2px}
.rm-list{
  flex:1;overflow-y:auto;padding:8px 10px 12px;
  display:flex;flex-direction:column;gap:3px;
}
.rm-list::-webkit-scrollbar{width:4px}
.rm-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.rm-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  border:none;transition:background .13s;
}
.rm-item:hover{background:var(--bg)}
.rm-badge{
  flex-shrink:0;display:inline-flex;align-items:center;
  padding:3px 9px;border-radius:6px;
  font-family:var(--body);font-size:11px;font-weight:700;
  color:#fff;white-space:nowrap;min-width:36px;justify-content:center;
}
.rm-info{flex:1;min-width:0}
.rm-short{font-size:13px;font-weight:600;color:var(--t1)}
.rm-long{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.rm-sep{font-size:10px;color:var(--t3);padding:6px 12px 2px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.rm-arrow{font-size:14px;color:var(--t3);flex-shrink:0;line-height:1}
.rm-empty{padding:24px;text-align:center;color:var(--t3);font-size:12px}

/* back-to-sources in route modal */
.rm-footer{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;justify-content:center;flex-shrink:0}
.rm-back{
  font-size:11.5px;color:var(--t3);background:none;border:none;
  cursor:pointer;display:flex;align-items:center;gap:5px;padding:6px 10px;
  border-radius:8px;transition:color .15s;
}
.rm-back:hover{color:var(--acc)}

<canvas id="canvas"></canvas>
<div id="labels-container"></div>

<!-- SEARCH BAR -->
<div id="search-bar" onclick="openSearch(event)">
  <div id="search-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
  </div>
  <input id="search-input" type="text" placeholder="Маршрут или остановка…" oninput="onSearchInput(this.value)" onkeydown="if(event.key==='Escape')closeSearch(event)" autocomplete="off" spellcheck="false">
  <button id="search-clear" onclick="closeSearch(event)" aria-label="Закрыть">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>
<div id="search-suggestions"></div>

<!-- FLOATING BUTTONS -->
<button id="locate-btn" title="Где я?" onclick="geolocateMe()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    <circle cx="12" cy="12" r="9" stroke-opacity=".3"/>
  </svg>
</button>
<button id="feed-btn" title="Сменить язык" onclick="showSplash()" style="font-size:18px;line-height:1">🌐</button>
<button id="theme-toggle" title="Тема" onclick="toggleTheme()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon">
    <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
  </svg>
</button>
<button id="planner-btn" title="Планировщик" onclick="togglePlannerMode()">⇄</button>
<button id="compass-btn" title="Компас" onclick="resetCompassOrientation()"><span class="compass-face"><span id="compass-needle">N</span></span></button>

<!-- DESKTOP PANEL -->
<div id="desk-panel">
  <div class="ph" style="display:none"></div>
  <div class="pb" style="padding-top:18px">
  <button class="panel-close-btn" onclick="closePanel()" title="Закрыть">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
    <div class="route-params" id="d-route-params"></div>
    <div id="d-planner-card"></div>

    </div>
    <div class="panel-view active" id="d-stops-view"><div class="sl" id="d-slist"></div></div>
    <div class="panel-view" id="d-routes-view"><div id="d-rlist"></div></div>
  </div>
</div>

<!-- MOBILE BOTTOM SHEET -->
<div id="mob-sheet">
  <div class="sheet-handle" id="sheet-handle">
    <button class="sheet-close-btn" onclick="closePanel()" title="Закрыть">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

      <input type="date" id="pop-date" onchange="onPopDateChange()">

    <div class="pop-times-label">Ближайшие рейсы</div>
    <div class="pop-times" id="pop-times"></div>
    <div class="pop-code" id="pop-code"></div>

</div>

</div>

// ── MOBILE SHEET ──────────────────────────────────────────────
(function(){
  const sheet=document.getElementById('mob-sheet');
  const handle=document.getElementById('sheet-handle');
  const peekRow=document.getElementById('sheet-peek-row');
  function getPeek(){return 88;}
  function getFull(){return window.innerHeight*0.82;}
  function isExpanded(){return sheet.classList.contains('expanded');}
  function setExpanded(on){sheet.classList.toggle('expanded',on);}
  peekRow.addEventListener('click',()=>setExpanded(!isExpanded()));
  let startY=0,startH=0,drag=false;
  function onDown(e){drag=true;startY=e.touches?e.touches[0].clientY:e.clientY;startH=sheet.offsetHeight;sheet.style.transition='none';}
  function onMove(e){
    if(!drag)return;e.preventDefault();
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const newH=Math.min(Math.max(startH+(startY-cy),getPeek()),getFull());
    sheet.style.height=newH+'px';
    const ratio=(newH-getPeek())/(getFull()-getPeek());
    const body=sheet.querySelector('.sheet-body');
    body.style.opacity=Math.min(ratio*2,1);
    body.style.pointerEvents=ratio>0.3?'auto':'none';
  }
  function onUp(){
    if(!drag)return;drag=false;
    sheet.style.transition='';
    setExpanded(sheet.offsetHeight>(getPeek()+getFull())/2);
    sheet.style.height='';
  }
  handle.addEventListener('mousedown',onDown);
  handle.addEventListener('touchstart',onDown,{passive:true});
  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('mouseup',onUp);
  document.addEventListener('touchend',onUp);
  document.addEventListener('touchcancel',onUp);
})();

const TARGET_VEHICLES_PER_ROUTE=10;
const ROUTE_COLOR_PALETTE=['#e84525','#2563eb','#0f9d58','#f59e0b','#7c3aed','#db2777','#0891b2','#65a30d','#ea580c','#dc2626','#4f46e5','#059669'];
const VEHICLE_MOTION_SMOOTHING_MS=420;
const VEHICLE_BEARING_SMOOTHING_MS=260;
const MIN_ROUTE_DURATION_MIN=8;
const MAX_ROUTE_DURATION_MIN=180;
const PLANNER_WALK_RADIUS_METERS=700;
const PLANNER_TRANSFER_RADIUS_METERS=220;

// ── УТИЛИТЫ (ФОРМАТИРОВАНИЕ, МАТЕМАТИКА) ──────────────────
function buildTripsData(path){
  const lens=[0];
  for(let i=1;i<path.length;i++){const dx=path[i][0]-path[i-1][0],dy=path[i][1]-path[i-1][1];lens.push(lens[i-1]+Math.sqrt(dx*dx+dy*dy));}
  const tot=lens[lens.length-1]||1;
  return [{path,timestamps:lens.map(l=>(l/tot)*LOOP)}];
}

function busPos(){
  if(!S.tripsData)return[0,0];
  const pos=getPathPos(S.tripsData[0],S.currentTime);
  return pos?[pos[0],pos[1]]:S.tripsData[0].path[S.tripsData[0].path.length-1];
}

function getPathPos(td,time){
  if(!td||!td.path||!td.path.length)return null;
  const ts=((time%LOOP)+LOOP)%LOOP;
  for(let i=1;i<td.timestamps.length;i++){
    if(td.timestamps[i]>=ts){
      const span=(td.timestamps[i]-td.timestamps[i-1])||1;
      const f=(ts-td.timestamps[i-1])/span;
      const [x1,y1]=td.path[i-1],[x2,y2]=td.path[i];
      return [x1+(x2-x1)*f,y1+(y2-y1)*f,i-1,i];
    }
  }
  const n=td.path.length-1;
  return [td.path[n][0],td.path[n][1],Math.max(0,n-1),n];
}

function getBearing(a,b){
  if(!a||!b)return 0;
  const dx=b[0]-a[0],dy=b[1]-a[1];
  return (Math.atan2(dx,dy)*180/Math.PI+360)%360;
}

function normalizeName(s){
  return String(s||'').toLowerCase().replace(/ё/g,'е').replace(/["«»]/g,'').replace(/\s+/g,' ').trim();
}

function hashString(s){
  let h=0;
  const str=String(s||'');
  for(let i=0;i<str.length;i++)h=((h<<5)-h+str.charCodeAt(i))|0;
  return Math.abs(h);
}

function dampFactor(deltaMs, smoothingMs){
  const safe=Math.max(1,smoothingMs||1);
  return 1-Math.exp(-Math.max(0,deltaMs)/safe);
}

function lerp(a,b,t){
  return a+(b-a)*t;
}

function shortestLoopDelta(from,to,loop){
  let delta=((to-from)%loop+loop)%loop;
  if(delta>loop/2)delta-=loop;
  return delta;
}

function lerpAngle(from,to,t){
  const delta=((((to-from)+540)%360)-180);
  return (from+delta*t+360)%360;
}

function clampAnimVelocity(value){
  const min=LOOP/(MAX_ROUTE_DURATION_MIN*60000);
  const max=LOOP/(MIN_ROUTE_DURATION_MIN*60000);
  if(!Number.isFinite(value))return LOOP/(45*60000);
  return Math.max(min,Math.min(max,value));
}

function getFallbackAnimVelocity(routeId){
  const ctx=S.routeContextById.get(routeId);
  const simTrips=ctx&&ctx.simTrips||[];
  if(simTrips.length){
    const avgDurationMin=simTrips.reduce((sum,trip)=>sum+Math.max(1,trip.durationMin||0),0)/simTrips.length;
    return clampAnimVelocity(LOOP/(avgDurationMin*60000));
  }
  return clampAnimVelocity(LOOP/(45*60000));
}

function getPaletteRouteHex(seed){
  return ROUTE_COLOR_PALETTE[hashString(seed)%ROUTE_COLOR_PALETTE.length];
}

function resolveRouteHex(route){
  const raw=String(route&&route.route_color||'').replace(/^#/,'');
  const valid=/^[0-9a-fA-F]{6}$/.test(raw)?('#'+raw.toLowerCase()):'';
  if(valid && valid!=='#e84525' && valid!=='#ff0000')return valid;
  return getPaletteRouteHex(route&&route.route_id||'route');
}

}

function getSelectedRoutes(){

function getPrimarySelectedRoute(){
  const selectedIds=getSelectedRouteIds();
  const activeId=S.activeSelectedRouteId&&S.selectedRouteIds&&S.selectedRouteIds.has(S.activeSelectedRouteId)
    ?S.activeSelectedRouteId
    :(selectedIds[selectedIds.length-1]||null);
  return activeId?(S.routeMetaById.get(activeId)||null):null;
}

function getRoutePathData(routeId){
  const ctx=S.routeContextById.get(routeId);
  if(!ctx||!ctx.shapePath||ctx.shapePath.length<2)return null;
  const route=ctx.route||S.routeMetaById.get(routeId)||{route_id:routeId,route_short_name:routeId,hex:getPaletteRouteHex(routeId)};
  return {routeId,path:ctx.shapePath,route,color:hexRgb(route.hex||resolveRouteHex(route))};
}

function getPreviewRouteData(routeIds){
  const data=[];
  const seen=new Set();
  for(const routeId of routeIds||[]){
    if(!routeId||seen.has(routeId))continue;
    seen.add(routeId);
    const item=getRoutePathData(routeId);
    if(item)data.push(item);
  }
  return data;
}

function getVisibleRouteIdsForMap(){
  if(S.route&&S.route.id)return [S.route.id];
  const selectedIds=getSelectedRouteIds();
  if(selectedIds.length)return selectedIds;
  return (S.visibleRoutes||[]).map(route=>route.route_id).filter(Boolean);
}

function getVisibleVehiclesForMap(){
  const vehicles=S.rtVehicles||[];
  const routeIds=getVisibleRouteIdsForMap();
  if(!routeIds.length)return vehicles;
  const allowed=new Set(routeIds);
  return vehicles.filter(vehicle=>allowed.has(vehicle.routeId));
}

    'sim-fill':'Офлайн добивка',
    'sim-fallback':'Офлайн fallback'
  };

function formatMinsUntil(time){
  if(!time)return 'нет данных';
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  let diff=parseTimeMin(time)-nowMin;
  if(diff<0)diff+=24*60;
  return diff<=0?'сейчас':`через ${diff} мин`;
}

function routeLengthKm(path){
  if(!path||path.length<2)return 0;
  let meters=0;
  for(let i=1;i<path.length;i++)meters+=haversineMeters(path[i-1][1],path[i-1][0],path[i][1],path[i][0]);
  return meters/1000;
}

function boolLabel(value){
  return String(value)==='1'?'Да':String(value)==='0'?'Нет':'Нет данных';
}

function getPrimaryRouteContext(){

async function goToRouteCard(routeId){
  if(!routeId)return;
  if(!S.route||S.route.id!==routeId){
    await setupAndShowRoute(routeId);
  }
  setInfoSlideByKey('route');
}

function goToStopCard(stopId){
  if(!stopId)return;
  const list=S.stops||[];
  const currentIndex=list.findIndex(stop=>stop.stop_id===stopId);
  const stop=currentIndex>=0?list[currentIndex]:S.stopById.get(stopId);
  if(!stop)return;
  S.activeStopId=stop.stop_id;
  syncActiveStopPin();
  if(!S.route)highlightRoutesForStop(stop);
  setInfoSlideByKey('stop');
}

function goToVehicleCard(vehicleId, routeId){
  let vehicle=vehicleId?(S.rtVehicles||[]).find(item=>item.id===vehicleId):null;
  if(!vehicle&&routeId)vehicle=(S.rtVehicles||[]).find(item=>item.routeId===routeId)||null;
  if(vehicle){
    focusVehicle(vehicle);
    return;
  }
  setInfoSlideByKey('vehicle');
}

function buildRouteTimelineHtml(routeId, stops){
  if(!stops||!stops.length)return '<div class="info-muted">Остановки для маршрута не найдены.</div>';
  let visitedIndex=-1;
  let nextIndex=0;
  if(S.route&&S.route.id===routeId&&S.stops&&S.stops.length){
    const pct=((S.currentTime%LOOP)+LOOP)%LOOP/LOOP;
    visitedIndex=Math.floor(pct*Math.max(0,S.stops.length-1));
    nextIndex=Math.min(visitedIndex+1,S.stops.length-1);
  }
  return `<div class="route-timeline">${stops.map((stop,index)=>`<div class="route-timeline-item"><div class="route-timeline-dot${index<=visitedIndex?' is-done':''}${index===nextIndex?' is-next':''}"></div><div class="route-timeline-copy"><div class="route-timeline-title">${escHtml(stop.name)}</div><div class="route-timeline-sub">${escHtml(stop.code?('код '+stop.code):('остановка '+(index+1)))}</div></div></div>`).join('')}</div>`;
}

// Строит объект слайда с данными маршрута (длина, время, остановки, прогресс)
function buildRouteSlide(){
  const{route,ctx}=getPrimaryRouteContext();
  if(!route){
    return {
      key:'route',
      label:'Маршрут',
      badge:'—',
      badgeColor:'#e84525',
      title:'Карточка маршрута',
      meta:'Выберите маршрут на карте или во вкладке маршрутов',
      rows:[],
      bodyHtml:'<div class="info-muted">Здесь появятся длина маршрута, среднее время в пути, атрибуты из GTFS и список остановок с прогрессом прохождения.</div>',
      chips:[]
    };
  }
  const routeId=route.route_id||route.id;
  const lengthKm=routeLengthKm(ctx&&ctx.shapePath||[]);
  const avgDurationMin=ctx&&ctx.simTrips&&ctx.simTrips.length?Math.round(ctx.simTrips.reduce((sum,trip)=>sum+Math.max(1,trip.durationMin||0),0)/ctx.simTrips.length):0;
  const progressPct=S.route&&S.route.id===routeId?Math.round((((S.currentTime%LOOP)+LOOP)%LOOP/LOOP)*100):0;
  const stopCount=ctx&&ctx.stops?ctx.stops.length:0;
  const activeVehicles=(S.rtVehicles||[]).filter(vehicle=>vehicle.routeId===routeId).length;
  const firstStop=ctx&&ctx.stops&&ctx.stops[0];
  const lastStop=ctx&&ctx.stops&&ctx.stops[ctx.stops.length-1];
  const activeStop=getActiveStopData();
  const routeStopForLink=activeStop&&[...(ctx&&ctx.stops||[])].some(stop=>stop.stop_id===activeStop.stop_id)?activeStop:(firstStop||null);
  const linkedVehicle=(S.rtVehicles||[]).find(vehicle=>vehicle.id===S.selectedVehicleId&&vehicle.routeId===routeId)||(S.rtVehicles||[]).find(vehicle=>vehicle.routeId===routeId)||null;
  const quickLinks=buildCardLinksHtml([
    {
      label:linkedVehicle?`ТС ${linkedVehicle.label||linkedVehicle.id}`:'ТС на маршруте',
      iconHtml:'&#128652;',
      onclick:linkedVehicle?`goToVehicleCard(${jsArg(linkedVehicle.id)},${jsArg(routeId)})`:''
    },
    {
      label:routeStopForLink?`Остановка ${routeStopForLink.name}`:'Остановки маршрута',
      iconHtml:'&#9679;',
      onclick:routeStopForLink?`goToStopCard(${jsArg(routeStopForLink.stop_id)})`:''
    }

    key:'route',
    label:'Маршрут',
    badge:route.route_short_name||routeId||'—',
    badgeColor:route.hex||resolveRouteHex(route),
    title:route.route_long_name||route.route_short_name||routeId||'Маршрут',
    meta:`${routeTypeLabel(route.route_type)} · ${stopCount} остановок · ${activeVehicles} ТС на карте`,
    rows:[
      {label:'Номер',value:route.route_short_name||'—'},
      {label:'Длина',value:lengthKm?`${lengthKm.toFixed(1)} км`:'—'},
      {label:'В пути',value:avgDurationMin?`${avgDurationMin} мин`:'—'},
      {label:'Тип',value:routeTypeLabel(route.route_type)},
      {label:'Route ID',value:routeId},
      {label:'Агентство',value:route.agency_id||'—'},
      {label:'Network',value:route.network_id||'—'},
      {label:'Цвет',value:route.route_color?`#${route.route_color}`:'по палитре'},
      {label:'Текст',value:route.route_text_color?`#${route.route_text_color}`:'—'},
      {label:'Посадка/высадка',value:`${route.continuous_pickup||'—'} / ${route.continuous_drop_off||'—'}`}
    ],
    bodyHtml:(()=>{
      const routeVehicles=(S.rtVehicles||[]).filter(v=>v.routeId===routeId);
      const vehicleListHtml=routeVehicles.length
        ?`<div class="info-board">${routeVehicles.map(v=>`<div class="info-board-row" style="cursor:pointer" onclick="goToVehicleCard(${jsArg(v.id)},${jsArg(routeId)});openPanel()"><div><div class="info-board-route">&#128652; ${escHtml(v.label||v.id)}</div><div class="info-muted">${escHtml(v.source==='sim'?'Симуляция · рейс'+v.tripId.split('_').pop():v.source)}</div></div><div class="info-board-time" style="font-size:10px;color:var(--t3)">›</div></div>`).join('')}</div>`

      return `<div class="info-slide-section"><div class="info-slide-section-title">Связанные карточки</div>${quickLinks}</div><div class="info-slide-section"><div class="info-slide-section-title">ТС на маршруте (${routeVehicles.length})</div>${vehicleListHtml}</div><div class="info-slide-section"><div class="info-slide-section-title">Сводка маршрута</div><div class="info-board"><div class="info-board-row"><div><div class="info-board-route">Начальная остановка</div><div class="info-muted">${escHtml(firstStop&&firstStop.code?('код '+firstStop.code):'точка старта')}</div></div><div class="info-board-time">${escHtml(firstStop&&firstStop.name||'—')}</div></div><div class="info-board-row"><div><div class="info-board-route">Конечная остановка</div><div class="info-muted">${escHtml(lastStop&&lastStop.code?('код '+lastStop.code):'точка завершения')}</div></div><div class="info-board-time">${escHtml(lastStop&&lastStop.name||'—')}</div></div></div></div><div class="info-slide-section"><div class="info-slide-section-title">Прохождение по остановкам</div><div class="route-card-progress"><div class="route-card-progress-top"><span>Прогресс маршрута</span><span>${progressPct}%</span></div><div class="route-card-track"><div class="route-card-fill" style="width:${progressPct}%"></div></div></div>${buildRouteTimelineHtml(routeId,(ctx&&ctx.stops)||[])}</div>`;
    })(),

function getActiveStopData(){
  if(!S.activeStopId)return null;
  const current=(S.stops||[]).find(stop=>stop.stop_id===S.activeStopId);
  if(current)return current;
  const stop=S.stopById.get(S.activeStopId);
  if(!stop)return null;
  return {...stop,arrivals:(S.arrivalsByStopId.get(stop.stop_id)||[]).slice(0,10)};
}

function getSelectedVehicle(){
  return (S.rtVehicles||[]).find(vehicle=>vehicle.id===S.selectedVehicleId)||null;
}

function getVehicleProfile(vehicle){
  if(!vehicle)return {route:null,trip:null,assignment:null,meta:null};
  const tripId=(vehicle.tripId||'').split(':')[0];
  const assignment=(tripId&&S.vehicleAssignmentByTripId.get(tripId))||S.vehicleAssignmentByRouteId.get(vehicle.routeId)||null;
  const meta=assignment&&S.vehicleMetaById.get(assignment.vehicle_id)||null;
  const trip=tripId&&S.tripMetaById.get(tripId)||null;
  const route=S.routeMetaById.get(vehicle.routeId)||null;
  return {route,trip,assignment,meta};
}

function highlightRoutesForStop(stop){
  if(!stop||S.route)return;
  const routeIds=[...(S.routeIdsByStopId.get(stop.stop_id)||[])].filter(Boolean);
  if(!routeIds.length)return;
  const sortedRouteIds=routeIds.sort((a,b)=>{
    const routeA=S.routeMetaById.get(a);
    const routeB=S.routeMetaById.get(b);
    return String(routeA&&routeA.route_short_name||a).localeCompare(String(routeB&&routeB.route_short_name||b),undefined,{numeric:true});
  });
  S.selectedRouteIds=new Set(sortedRouteIds);
  S.activeSelectedRouteId=sortedRouteIds[0]||null;
  buildRoutesList();
  renderInfoSlides();
}

function buildInfoSlides(){
  return[
    buildNearbySlide(),
    buildRouteSlide(),
    buildStopSlide(),
    buildVehicleSlide()
  ];
}

function setInfoSlideIndex(index){
  const slides=buildInfoSlides();
  if(!slides.length){
    S.infoSlideIndex=0;
    renderInfoSlides();
    return;
  }
  const total=slides.length;
  S.infoSlideIndex=((index%total)+total)%total;
  renderInfoSlides();
}

function stepInfoSlide(delta){
  setInfoSlideIndex((S.infoSlideIndex||0)+delta);
}

function renderInfoSlides(){
  const slides=buildInfoSlides();
  if(!slides.length){
    ['d-route-params','m-route-params'].forEach(id=>{
      const el=document.getElementById(id);
      if(el)el.innerHTML='<div class="info-slides-empty">Выберите маршрут, остановку или транспорт на карте</div>';
    });
    return;
  }
  if((S.infoSlideIndex||0)>=slides.length)S.infoSlideIndex=slides.length-1;
  const index=Math.max(0,S.infoSlideIndex||0);
  const html=`<div class="info-slides"><div class="info-slides-head"><div class="info-slides-label">Карточки</div><div class="info-slides-nav">${slides.length>1?`<button class="info-slide-arrow" onclick="stepInfoSlide(-1)" aria-label="Предыдущий слайд">‹</button><button class="info-slide-arrow" onclick="stepInfoSlide(1)" aria-label="Следующий слайд">›</button>`:''}</div></div><div class="info-slides-window"><div class="info-slides-track" style="transform:translateX(-${index*100}%);">${slides.map(slide=>{
    const rowsHtml=slide.rows&&slide.rows.length?`<div class="info-slide-grid">${slide.rows.map(row=>`<div class="info-slide-row"><div class="info-slide-row-label">${escHtml(row.label)}</div><div class="info-slide-row-value">${escHtml(row.value)}</div></div>`).join('')}</div>`:'';

    return `<section class="info-slide"><article class="info-slide-card"><div class="info-slide-top"><div class="info-slide-badge" style="background:${escHtml(slide.badgeColor)}">${escHtml(slide.badge)}</div><div class="info-slide-main"><div class="info-slide-kicker">${escHtml(slide.label)}</div><div class="info-slide-title">${escHtml(slide.title)}</div><div class="info-slide-meta">${escHtml(slide.meta)}</div></div></div>${rowsHtml}${bodyHtml}${chipsHtml}</article></section>`;
  }).join('')}</div></div>${slides.length>1?`<div class="info-slide-dots">${slides.map((slide,slideIndex)=>`<button class="info-slide-dot${slideIndex===index?' active':''}" onclick="setInfoSlideIndex(${slideIndex})" aria-label="${escHtml(slide.label)}"></button>`).join('')}</div>`:''}</div>`;

function focusRoutePreview(routeId){
  const ctx=S.routeContextById.get(routeId);
  if(!ctx||!ctx.shapePath||!ctx.shapePath.length)return;
  const lons=ctx.shapePath.map(p=>p[0]);
  const lats=ctx.shapePath.map(p=>p[1]);
  const span=Math.max(Math.max(...lons)-Math.min(...lons),Math.max(...lats)-Math.min(...lats));
  const zoom=span>0.2?11.6:span>0.08?12.4:span>0.03?13.2:14.1;
  deckgl.setProps({initialViewState:{
    longitude:(Math.min(...lons)+Math.max(...lons))/2,
    latitude:(Math.min(...lats)+Math.max(...lats))/2,
    zoom,pitch:0,bearing:0,transitionDuration:700
  }});
}

function renderSelectedRoutesCard(){
  renderInfoSlides();
}

function updatePlannerButton(){
  const btn=document.getElementById('planner-btn');
  if(!btn)return;
  btn.classList.toggle('is-active',!!(S.planner.pickMode||S.planner.from||S.planner.to||S.planner.result));
}

function setPlannerPickMode(mode){
  S.planner.pickMode=S.planner.pickMode===mode?null:mode;
  updatePlannerButton();
  renderPlannerCard();
}

function togglePlannerMode(){
  if(!S.parsed){showSplash();return;}
  if(isPanelOpen()){closePanel();return;}
  openPanel();
  if(!S.planner.from){
    setPlannerPickMode('from');
    return;
  }
  if(!S.planner.to){
    setPlannerPickMode('to');
    return;
  }
  setPlannerPickMode(S.planner.pickMode?null:'from');
}

function clearPlannerRoute(){
  S.planner.from=null;
  S.planner.to=null;
  S.planner.pickMode=null;
  S.planner.result=null;
  S.planner.error='';
  S.planner.stats=null;
  updatePlannerButton();
  renderPlannerCard();
}

function usePlannerUserLocation(){
  if(!S.userLocation){
    geolocateMe();
    S.planner.error='';
    renderPlannerCard();
    return;
  }
  setPlannerPoint('from',S.userLocation.lon,S.userLocation.lat,{source:'user'});
}

function setPlannerPoint(target,lon,lat,meta={}){
  const actualTarget=target||S.planner.pickMode||(!S.planner.from?'from':'to');
  S.planner[actualTarget]=makePlannerPoint(lon,lat,meta);
  S.planner.result=null;
  S.planner.error='';
  S.planner.stats=null;
  if(S.planner.pickMode===actualTarget)S.planner.pickMode=actualTarget==='from'?'to':null;
  updatePlannerButton();
  if(S.planner.from&&S.planner.to){
    computePlannerRoute();
  }else{
    renderPlannerCard();
  }
}

function setPlannerPointFromStop(target,stop){
  if(!stop)return;
  setPlannerPoint(target,stop.lon,stop.lat,{source:'stop',stopId:stop.stop_id,stopName:stop.name});
}
